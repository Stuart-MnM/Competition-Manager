// LEAGUE
// ══════════════════════════════════════════════════════════════════════════════
function renderLeague(){
  const {leagueData,ui}=STATE;
  const rows=Object.entries(leagueData).map(([id,d])=>({...d,id:parseInt(id)})).sort((a,b)=>(b.grossSkins+b.nettSkins)-(a.grossSkins+a.nettSkins));
  const topG=rows.slice().sort((a,b)=>b.grossSkins-a.grossSkins)[0];
  const topN=rows.slice().sort((a,b)=>b.nettSkins-a.nettSkins)[0];
  const topM=rows.slice().sort((a,b)=>b.winnings-a.winnings)[0];
  const resetBtn=ui.leagueResetConfirm?`<div class="confirm-strip"><span class="tsm" style="color:var(--rd)">Reset entire season?</span><button class="btn bd bsm" data-action="reset-season-confirm">Yes, reset</button><button class="btn bo bsm" data-action="reset-season-cancel">Cancel</button></div>`:`<button class="btn bd bsm" data-action="reset-season-ask">🗑 Reset Season</button>`;
  if(!rows.length) return page('Season League Table','Cumulative results · no data yet','',`<div class="card"><div class="es"><div class="ei">📊</div><div>No league data yet.</div><div class="tsm tmu mt8">Commit results from the Results tab after each round.</div></div></div>`);
  let tableRows='';
  rows.forEach((r,i)=>{tableRows+=`<tr class="${i===0?'r1':i===1?'r2':i===2?'r3':''}"><td style="font-family:'Playfair Display',serif;font-size:1rem">${i+1}</td><td class="bld">${e(r.name)}</td><td style="text-align:center">${r.grossSkins||0}</td><td style="text-align:center">${r.nettSkins||0}</td><td style="text-align:center">${r.sfPoints||0}</td><td style="text-align:center"><span class="sn2">${(r.grossSkins||0)+(r.nettSkins||0)}</span></td><td style="color:var(--gm);font-weight:600">${(r.winnings||0)>0?`€${(r.winnings||0).toFixed(2)}`:'—'}</td><td class="tmu">${r.played||0}</td></tr>`;});
  return page('Season League Table',`Cumulative · ${rows.length} players on the board`,resetBtn,
    `<div class="rg mb16" style="grid-template-columns:1fr 1fr 1fr">${[{label:'Top Gross Skins',p:topG,val:(topG?.grossSkins||0)+' skins',icon:'⛳'},{label:'Top Nett Skins',p:topN,val:(topN?.nettSkins||0)+' skins',icon:'🏌️'},{label:'Top Earner',p:topM,val:'€'+(topM?.winnings||0).toFixed(0),icon:'💰'}].map(({label,p,val,icon})=>`<div class="card" style="margin:0;text-align:center;border-top:3px solid var(--go)"><div style="font-size:1.3rem">${icon}</div><div class="tsm tmu" style="letter-spacing:1px;text-transform:uppercase;margin:3px 0">${label}</div><div style="font-family:'Playfair Display',serif;font-weight:700;color:var(--gd);font-size:.92rem">${e(p?.name||'—')}</div><div style="color:var(--go);font-weight:600;font-size:.86rem">${val}</div></div>`).join('')}</div>
    <div class="card" style="padding:0"><div class="tw"><table><thead><tr><th>Rank</th><th>Player</th><th>⛳ Gross Skins</th><th>🏌️ Nett Skins</th><th>🏅 SF Pts</th><th>Total Skins</th><th>Winnings</th><th>Rounds</th></tr></thead><tbody>${tableRows}</tbody></table></div></div>`
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// FINANCE
// ══════════════════════════════════════════════════════════════════════════════
function renderFinance(){
  const {players,grossScores,nettScores,normalScores,kitty,ui}=STATE;

  // ── Competition & winners from Results page ──
  const activeComp=competitions().find(c=>c.id===ui.competitionType)||competitions()[0];
  const teamGame=isTeamGame(ui.competitionType);
  const ghosts=STATE.ghostAssignments||{};
  const getGhostId=gid=>ghosts[String(gid)]?parseInt(ghosts[String(gid)]):null;

  // Resolve winning players from Results page selections
  let winnerIds=new Set(); // player IDs who get the discount
  let ghostWinnerIds=new Set(); // ghost IDs — no discount
  if(teamGame&&ui.selectedWinningGroup){
    const selGroup=STATE.teeGroups.find(g=>g.id===parseInt(ui.selectedWinningGroup));
    if(selGroup){
      selGroup.members.map(id=>parseInt(id)).forEach(id=>winnerIds.add(id));
      const ghostId=getGhostId(selGroup.id);
      if(ghostId){ghostWinnerIds.add(ghostId);winnerIds.delete(ghostId);}
    }
  } else if(!teamGame&&ui.selectedWinners?.length){
    ui.selectedWinners.slice(0,activeComp?.winnersCount||1)
      .map(id=>parseInt(id)).filter(Boolean).forEach(id=>winnerIds.add(id));
  }

  // ── Calculations ──
  const gp=players.filter(p=>p.playGross),np=players.filter(p=>p.playNett),mp=players.filter(p=>p.playNormal);
  const allActive=players.filter(p=>p.playGross||p.playNett||p.playNormal);
  const gf=gp.length*ENTRY_FEE,nf=np.length*ENTRY_FEE,mf=mp.length*ENTRY_FEE;
  const total=gf+nf+mf;
  const gSkins=calcSkins(gp,grossScores),nSkins=calcNettSkins(np,nettScores);
  const tgs=Object.values(gSkins).reduce((a,b)=>a+b,0),tns=Object.values(nSkins).reduce((a,b)=>a+b,0);
  const gsv=tgs>0?Math.floor(gf/tgs):0,nsv=tns>0?Math.floor(nf/tns):0;
  const gRem=gf-(gsv*tgs),nRem=nf-(nsv*tns);
  const gPaid=tgs*gsv,nPaid=tns*nsv;
  // Winner discount per player: individual=€10 off, pairs/team=€5 off
  const dpw=activeComp?.id==='individual_winners_free'?ENTRY_FEE:ENTRY_FEE/2;
  const totalDisc=winnerIds.size*dpw;
  const netMf=Math.max(0,mf-totalDisc);
  const barBill=parseFloat(ui.kittyBarBill)||0;
  const netToKitty=Math.max(0,gRem+nRem+netMf-barBill);
  const totalDeducted=gPaid+nPaid+totalDisc+barBill;

  // ── Per-player fees (winners from Results page get discount) ──
  const pfees=allActive.map(p=>{
    const games=[p.playGross&&'Gross',p.playNett&&'Nett',p.playNormal&&'Stableford'].filter(Boolean);
    const base=games.length*ENTRY_FEE;
    const isWinner=winnerIds.has(p.id);
    const disc=isWinner?dpw:0;
    return{...p,games,base,disc,owes:base-disc,isWinner};
  }).sort((a,b)=>b.owes-a.owes);

  // ── Confirm state for Add to Kitty ──
  const pendingAdd=ui.finKittyPending;

  return page('Finance & Fees',`Today's money · €${ENTRY_FEE} entry per game per player`,'',
    `<!-- Season Kitty -->
    <div class="kd" style="margin-bottom:16px">
      <div class="ka">€${kitty.toFixed(2)}</div>
      <div class="kl">Season Kitty Total</div>
    </div>

    <!-- Entry Fees Collected banner -->
    <div class="card" style="background:linear-gradient(135deg,var(--gd),var(--gm));padding:20px 24px;margin-bottom:0">
      <div style="color:var(--go);font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;margin-bottom:14px">💷 Entry Fees Collected</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:12px;align-items:end">
        <div style="background:rgba(255,255,255,.08);border-radius:8px;padding:12px 14px">
          <div style="color:var(--cd);font-size:.7rem;text-transform:uppercase;letter-spacing:1px">⛳ Gross</div>
          <div style="color:var(--gl2);font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700">€${gf}</div>
          <div style="color:var(--tl);font-size:.72rem">${gp.length} player${gp.length!==1?'s':''} × €${ENTRY_FEE}</div>
        </div>
        <div style="background:rgba(255,255,255,.08);border-radius:8px;padding:12px 14px">
          <div style="color:var(--cd);font-size:.7rem;text-transform:uppercase;letter-spacing:1px">🏌️ Nett</div>
          <div style="color:var(--gl2);font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700">€${nf}</div>
          <div style="color:var(--tl);font-size:.72rem">${np.length} player${np.length!==1?'s':''} × €${ENTRY_FEE}</div>
        </div>
        <div style="background:rgba(255,255,255,.08);border-radius:8px;padding:12px 14px">
          <div style="color:var(--cd);font-size:.7rem;text-transform:uppercase;letter-spacing:1px">🏅 Stableford</div>
          <div style="color:var(--gl2);font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700">€${mf}</div>
          <div style="color:var(--tl);font-size:.72rem">${mp.length} player${mp.length!==1?'s':''} × €${ENTRY_FEE}</div>
        </div>
        <div style="background:var(--go);border-radius:8px;padding:12px 14px;text-align:center">
          <div style="color:var(--gd);font-size:.7rem;text-transform:uppercase;letter-spacing:1px;font-weight:700">Total Collected</div>
          <div style="color:var(--gd);font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700">€${total}</div>
          <div style="color:var(--gd);font-size:.72rem">${allActive.length} players</div>
        </div>
      </div>
    </div>

    <!-- Money flow: Total Deducted / Leftover -->
    <div class="card" style="border-left:4px solid var(--go);margin-top:0;border-radius:0 0 12px 12px;border-top:none">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0">
        <div style="padding:10px 14px;border-right:1px solid var(--cd)">
          <div class="tsm tmu" style="margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Total Deducted</div>
          <div class="flex jbs" style="margin-bottom:5px;font-size:.84rem"><span>⛳ Gross skins paid (${tgs} × €${gsv})</span><span style="color:var(--rd)">€${gPaid}</span></div>
          <div class="flex jbs" style="margin-bottom:5px;font-size:.84rem"><span>🏌️ Nett skins paid (${tns} × €${nsv})</span><span style="color:var(--rd)">€${nPaid}</span></div>
          <div class="flex jbs" style="margin-bottom:5px;font-size:.84rem"><span>🏅 Winner discount (${winnerIds.size} × €${dpw})</span><span style="color:var(--rd)">€${totalDisc}</span></div>
          <div class="flex jbs" style="margin-bottom:5px;font-size:.84rem;align-items:center">
            <span>🍺 Bar bill</span>
            <div class="flex gap8 aic">
              <input class="fi fn" type="text" inputmode="decimal" id="bar-bill" value="${ui.kittyBarBill}" placeholder="0" style="width:70px;padding:4px 8px;font-size:.82rem" oninput="STATE.ui.kittyBarBill=this.value" onchange="STATE.ui.kittyBarBill=this.value;render()">
              <span style="color:var(--rd)">€${barBill.toFixed(2)}</span>
            </div>
          </div>
          <div class="flex jbs" style="border-top:1px solid var(--cd);margin-top:8px;padding-top:6px;font-weight:700"><span>Total Deducted</span><span style="color:var(--rd)">€${totalDeducted.toFixed(2)}</span></div>
        </div>
        <div style="padding:10px 14px">
          <div class="tsm tmu" style="margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Leftover</div>
          <div class="flex jbs" style="margin-bottom:5px;font-size:.84rem"><span>⛳ Gross pot leftover</span><span style="color:var(--gm)">€${gRem}</span></div>
          <div class="flex jbs" style="margin-bottom:5px;font-size:.84rem"><span>🏌️ Nett pot leftover</span><span style="color:var(--gm)">€${nRem}</span></div>
          <div class="flex jbs" style="margin-bottom:5px;font-size:.84rem"><span>🏅 Stableford net pot</span><span style="color:#7c5cbf">€${netMf}</span></div>
          <div class="flex jbs" style="margin-bottom:5px;font-size:.84rem"><span>🍺 Bar bill</span><span style="color:var(--rd)">− €${barBill.toFixed(2)}</span></div>
          <div class="flex jbs" style="border-top:1px solid var(--cd);margin-top:8px;padding-top:6px;font-weight:700"><span>Net to Kitty</span><span style="color:var(--go);font-size:1rem">€${netToKitty.toFixed(2)}</span></div>
        </div>
      </div>
    </div>

    <!-- Stableford Pot summary -->
    <div class="card" style="border-left:4px solid #7c5cbf">
      <div class="flex jbs aic" style="margin-bottom:12px">
        <div>
          <div style="font-family:'Playfair Display',serif;font-weight:700;color:var(--gd);font-size:1rem">🏅 Stableford Pot</div>
          <div class="tsm tmu">${mp.length} player${mp.length!==1?'s':''} × €${ENTRY_FEE} collected</div>
          <div class="tsm tmu" style="margin-top:2px">Competition: <strong>${e(activeComp?.label||'—')}</strong></div>
        </div>
        <div style="text-align:right">
          <div style="font-family:'Playfair Display',serif;font-size:1.6rem;color:#7c5cbf;font-weight:700">€${netMf}</div>
          <div class="tsm tmu">after winner discount</div>
        </div>
      </div>
      <div style="background:var(--gp);border-radius:8px;padding:10px 14px;font-size:.84rem;margin-bottom:12px">
        <div class="flex jbs"><span>Fees collected</span><strong>€${mf}</strong></div>
        <div class="flex jbs mt8"><span>Winner discount — ${winnerIds.size} winner${winnerIds.size!==1?'s':''} × €${dpw} off</span><span style="color:var(--rd)">− €${totalDisc}</span></div>
        <div class="flex jbs mt8" style="border-top:1px solid var(--cd);padding-top:8px"><span style="font-weight:600">Net Stableford pot</span><strong style="color:#7c5cbf">€${netMf}</strong></div>
      </div>
      ${winnerIds.size>0?`<div style="margin-bottom:12px;font-size:.82rem">
        <div class="tsm tmu" style="margin-bottom:6px">Winners (from Results page)${winnerIds.size===0?' — none selected yet':''}:</div>
        ${[...winnerIds].map(id=>{const p=players.find(q=>q.id===id);return p?`<div class="flex jbs aic" style="padding:4px 0;border-bottom:1px solid var(--cd)"><span>🏆 ${e(p.name)}</span><span style="color:var(--go);font-weight:600">pays €${ENTRY_FEE-dpw} today</span></div>`:'';}).join('')}
      </div>`:'<div class="tsm tmu" style="margin-bottom:12px">No winners selected yet — go to Results page to select winners.</div>'}
      <!-- Add to Kitty -->
      <div style="background:${ui.finAdded?'#e8f4f0':'#fffbf0'};border-radius:8px;padding:12px 14px">
        <div class="flex jbs aic" style="flex-wrap:wrap;gap:10px">
          <div>
            <div style="font-weight:700;color:var(--gd);font-size:.9rem">Add to Season Kitty</div>
            <div class="tsm tmu">Net to Kitty: <strong style="color:var(--go);font-size:.95rem">€${netToKitty.toFixed(2)}</strong>${barBill>0?` (after €${barBill.toFixed(2)} bar bill)`:''}</div>
          </div>
          ${ui.finAdded
            ?`<div class="flex gap8 aic"><span style="color:var(--gm);font-weight:600">✅ Added to Kitty!</span><span class="tsm tmu">Done for this round.</span></div>`
            :pendingAdd
              ?`<div class="flex gap8 aic"><span class="tsm" style="color:var(--gd)">Add <strong>€${netToKitty.toFixed(2)}</strong> to kitty?</span><button class="btn bg bsm" data-action="add-normal-kitty">✓ Confirm</button><button class="btn bo bsm" data-action="kitty-add-cancel">Cancel</button></div>`
              :`<button class="btn bg" data-action="kitty-add-pending" ${netToKitty===0?'disabled':''}>Add €${netToKitty.toFixed(2)} to Kitty →</button>`
          }
        </div>
        <div class="flex gap8 aic mt8" style="flex-wrap:wrap">
          <span class="tsm tmu">Season kitty: <strong style="color:var(--gd);font-size:.95rem">€${kitty.toFixed(2)}</strong></span>
          ${ui.kittyClearConfirm
            ?`<div class="confirm-strip" style="margin-bottom:0"><span class="tsm" style="color:var(--rd)">Reset kitty to €0?</span><button class="btn bd bsm" data-action="kitty-clear-confirm">Yes, reset</button><button class="btn bo bsm" data-action="kitty-clear-cancel">Cancel</button></div>`
            :`<button class="btn bd bsm" data-action="kitty-clear-ask">🗑 Reset Kitty</button>`}
        </div>
      </div>
    </div>

    <!-- Per-Player Fee Breakdown -->
    ${pfees.length>0?`<div class="card" style="padding:0">
      <div style="padding:16px 18px 10px;font-family:'Playfair Display',serif;font-weight:700;color:var(--gd);font-size:1rem;border-bottom:1px solid var(--cd)">Per-Player Fee Breakdown</div>
      <div class="tw"><table><thead><tr><th>Player</th><th>Games</th><th style="text-align:right">Base</th><th style="text-align:right">Discount</th><th style="text-align:right">Owes Today</th></tr></thead>
      <tbody>
        ${pfees.map(p=>`<tr style="${p.isWinner?'background:linear-gradient(90deg,#fffbf0,var(--wh))':''}">
          <td class="bld">${p.isWinner?'🏆 ':''}${e(p.name)}</td>
          <td>${p.games.map(g=>`<span class="tg ${g==='Gross'?'tgg':g==='Nett'?'tgn':'tgm'}">${g==='Gross'?'⛳':g==='Nett'?'🏌️':'🏅'} ${g}</span>`).join(' ')}</td>
          <td style="text-align:right">€${p.base}</td>
          <td style="text-align:right;color:${p.disc>0?'var(--gm)':'var(--tl)'}">${p.disc>0?`−€${p.disc}`:'—'}</td>
          <td style="text-align:right;font-weight:700;color:var(--gd)">€${p.owes}</td>
        </tr>`).join('')}
        <tr style="background:var(--gp);border-top:2px solid var(--cd)">
          <td class="bld" colspan="2">Total</td>
          <td style="text-align:right;font-weight:600">€${pfees.reduce((a,p)=>a+p.base,0)}</td>
          <td style="text-align:right;color:var(--gm);font-weight:600">−€${pfees.reduce((a,p)=>a+p.disc,0)}</td>
          <td style="text-align:right;font-weight:700;color:var(--gd)">€${pfees.reduce((a,p)=>a+p.owes,0)}</td>
        </tr>
      </tbody></table></div>
    </div>`:`<div class="card"><div class="es"><div class="ei">💰</div><div>No players selected for today.</div></div></div>`}`
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════════════════════
function render(){
  document.getElementById('hdr-date').textContent=fmtDate();
  document.getElementById('nav').innerHTML=TABS.map(t=>`<button class="nb${STATE.tab===t.id?' act':''}" data-nav="${t.id}">${t.icon} ${t.label}</button>`).join('');
  const p=STATE.tab;
  let html='';
  if(p==='players')      html=renderPlayers();
  else if(p==='scores')  html=renderScores();
  else if(p==='results') html=renderResults();
  else if(p==='constraints') html=renderConstraints();
  else if(p==='teetimes')html=renderTeeTimes();
  else if(p==='league')  html=renderLeague();
  else if(p==='finance') html=renderFinance();
  document.getElementById('main').innerHTML=html;
}

// ══════════════════════════════════════════════════════════════════════════════
// EVENTS
// ══════════════════════════════════════════════════════════════════════════════
document.addEventListener('click',ev=>{
  const navEl=ev.target.closest('[data-nav]');
  if(navEl){STATE.tab=navEl.dataset.nav;render();return;}
  const btn=ev.target.closest('[data-action]');
  if(!btn)return;
  const act=btn.dataset.action;
  const {players,ui}=STATE;

  // Players
  if(act==='show-add'){setUI({playersShowAdd:true});}
  if(act==='cancel-add'){setUI({playersShowAdd:false,playersNewName:'',playersNewHi:''});}
  if(act==='add-player'){
    const nm=document.getElementById('new-name')?.value.trim();
    const hi=parseFloat(document.getElementById('new-hi')?.value)||18.0;
    if(!nm)return;
    const id=Math.max(0,...players.map(p=>p.id))+1;
    saveAndSet('golf:players',[...players,{id,name:nm,hi}],'players');
    setUI({playersShowAdd:false,playersNewName:'',playersNewHi:''});
  }
  if(act==='start-edit'){const p=players.find(p=>p.id===parseInt(btn.dataset.id));if(p)setUI({playersEditing:p.id,playersEditName:p.name,playersEditHi:p.hi});}
  if(act==='cancel-edit'){setUI({playersEditing:null});}
  if(act==='save-edit'){
    const nm=document.getElementById('edit-name')?.value.trim();
    const hi=parseFloat(document.getElementById('edit-hi')?.value);
    const id=parseInt(btn.dataset.id);
    saveAndSet('golf:players',players.map(p=>p.id===id?{...p,name:nm||p.name,hi:hi||p.hi}:p),'players');
    setUI({playersEditing:null});
  }
  if(act==='remove-player'){const id=parseInt(btn.dataset.id);if(confirm('Remove this player?'))saveAndSet('golf:players',players.filter(p=>p.id!==id),'players');}
  if(act==='clear-selections-ask'){setUI({playersClearConfirm:true});}
  if(act==='clear-selections-cancel'){setUI({playersClearConfirm:false});}
  if(act==='clear-selections-confirm'){saveAndSet('golf:players',players.map(p=>({...p,playGross:false,playNett:false,playNormal:false})),'players');setUI({playersClearConfirm:false,kittyBarBill:'',finAdded:false,finKittyPending:false,selectedWinners:[],selectedWinningGroup:''});}
  if(act==='players-import-open'){setUI({playersShowImport:true,playersImportPaste:'',playersImportPreview:null,playersImportError:''});}
  if(act==='players-import-close'){setUI({playersShowImport:false});}
  if(act==='players-import-cancel-preview'){setUI({playersImportPaste:'',playersImportPreview:null,playersImportError:''});}
  if(act==='players-import-parse'){
    const txt=document.getElementById('players-import-paste')?.value||'';
    const{players:parsed,errors}=parsePlayerImport(txt);
    if(errors.length&&!parsed.length){setUI({playersImportError:errors.join(' | '),playersImportPaste:txt});return;}
    setUI({playersImportPaste:txt,playersImportPreview:parsed,playersImportError:errors.length?errors.join(' | '):''});
  }
  if(act==='players-import-confirm'){
    const prev=ui.playersImportPreview;if(!prev||!prev.length)return;
    const replace=document.getElementById('import-replace')?.checked||false;
    const base=replace?[]:players;
    const startId=Math.max(0,...base.map(p=>p.id))+1;
    saveAndSet('golf:players',[...base,...prev.map((p,i)=>({id:startId+i,name:p.name,hi:p.hi}))],'players');
    setUI({playersShowImport:false,playersImportPaste:'',playersImportPreview:null,playersImportError:''});
  }

  if(act==='clear-all-scores'){
    if(!confirm('Clear ALL scores (Gross, Nett and Normal) for a new round?'))return;
    const emptyScores=(pl)=>{const c={};pl.forEach(p=>{c[p.id]=Array(18).fill('');});return c;};
    saveAndSet('golf:grossScores',emptyScores(players.filter(p=>p.playGross)),'grossScores');
    saveAndSet('golf:nettScores',emptyScores(players.filter(p=>p.playNett)),'nettScores');
    saveAndSet('golf:normalScores',emptyScores(players.filter(p=>p.playNormal)),'normalScores');
    setUI({resultsCommitted:false,resultsConfirm:false,kittyAddedConfirm:false,finAdded:false,finKittyPending:false,kittyBarBill:'',selectedWinners:[],selectedWinningGroup:''});
  }
  // Scores
  if(act==='scores-view'){setUI({scoresView:btn.dataset.view});}
  if(act==='scores-tab'){setUI({scoresTab:btn.dataset.tab});}
  if(act==='clear-scores'){
    const type=btn.dataset.type;if(!confirm(`Clear all ${type} scores?`))return;
    const pl=players.filter(p=>p[type==='gross'?'playGross':type==='nett'?'playNett':'playNormal']);
    const c={};pl.forEach(p=>{c[p.id]=Array(18).fill('');});
    if(type==='gross')saveAndSet('golf:grossScores',{...STATE.grossScores,...c},'grossScores');
    else if(type==='nett')saveAndSet('golf:nettScores',{...STATE.nettScores,...c},'nettScores');
    else saveAndSet('golf:normalScores',{...STATE.normalScores,...c},'normalScores');
  }
  if(act==='import-reset'){setUI({importPaste:'',importPreview:null,importError:'',importDone:false,importPlayerId:''});}
  if(act==='do-import'){
    const prev=ui.importPreview;const pid=parseInt(ui.importPlayerId);if(!prev||!pid)return;
    const scores18=prev.map(String);
    if(ui.importGameType==='gross')saveAndSet('golf:grossScores',{...STATE.grossScores,[pid]:scores18},'grossScores');
    else if(ui.importGameType==='nett')saveAndSet('golf:nettScores',{...STATE.nettScores,[pid]:scores18},'nettScores');
    else saveAndSet('golf:normalScores',{...STATE.normalScores,[pid]:scores18},'normalScores');
    setUI({importDone:true,importError:''});
  }

  // Results / Kitty
  if(act==='add-kitty'){
    const amt=parseFloat(document.getElementById('kitty-amt')?.value);
    if(isNaN(amt)||amt===0)return;
    saveAndSet('golf:kitty',parseFloat((STATE.kitty+amt).toFixed(2)),'kitty');
    setUI({kittyManualOverride:'',kittyBarBill:'',kittyAddedConfirm:true});
  }
  if(act==='kitty-clear-ask'){setUI({kittyClearConfirm:true});}
  if(act==='kitty-clear-cancel'){setUI({kittyClearConfirm:false});}
  if(act==='kitty-clear-confirm'){saveAndSet('golf:kitty',0,'kitty');setUI({kittyClearConfirm:false,kittyAddedConfirm:false});}
  if(act==='show-commit'){setUI({resultsConfirm:true});}
  if(act==='cancel-commit'){setUI({resultsConfirm:false});}
  if(act==='do-commit'){
    const{players,grossScores,nettScores,normalScores,leagueData,kitty}=STATE;
    const gp=players.filter(p=>p.playGross),np=players.filter(p=>p.playNett),mp=players.filter(p=>p.playNormal);
    const gSkins=calcSkins(gp,grossScores),nSkins=calcNettSkins(np,nettScores);
    const tgs=Object.values(gSkins).reduce((a,b)=>a+b,0),tns=Object.values(nSkins).reduce((a,b)=>a+b,0);
    const gf=gp.length*ENTRY_FEE,nf=np.length*ENTRY_FEE;
    const gsv=gp.length&&tgs>0?Math.floor(gf/tgs):0,nsv=np.length&&tns>0?Math.floor(nf/tns):0;
    const sfTotals={};
    mp.forEach(p=>{const chcp=calcCourseHcp(p.hi);sfTotals[p.id]=HOLES.reduce((t,_,h)=>t+(calcStableford(normalScores[p.id]?.[h],PAR[h],strokesOnHole(chcp,h))??0),0);});
    const next=JSON.parse(JSON.stringify(leagueData));
    const ensure=p=>{if(!next[p.id])next[p.id]={name:p.name,grossSkins:0,nettSkins:0,sfPoints:0,sfSaving:0,winnings:0,played:0};next[p.id].name=p.name;};
    gp.forEach(p=>{ensure(p);next[p.id].grossSkins+=(gSkins[p.id]||0);next[p.id].winnings+=(gSkins[p.id]||0)*gsv;next[p.id].played+=1;});
    np.forEach(p=>{ensure(p);next[p.id].nettSkins+=(nSkins[p.id]||0);next[p.id].winnings+=(nSkins[p.id]||0)*nsv;if(!gp.find(g=>g.id===p.id))next[p.id].played+=1;});
    const sfSorted=[...mp].sort((a,b)=>(sfTotals[b.id]||0)-(sfTotals[a.id]||0));
    const topScore=sfTotals[sfSorted[0]?.id]||0;
    mp.forEach(p=>{ensure(p);next[p.id].sfPoints+=(sfTotals[p.id]||0);if(!gp.find(g=>g.id===p.id)&&!np.find(g=>g.id===p.id))next[p.id].played+=1;});
    saveAndSet('golf:league',next,'leagueData');
    setUI({resultsCommitted:true,resultsConfirm:false});
  }

  // Constraints — FIX 1
  if(act==='cmode'){setUI({constraintMode:btn.dataset.mode,constraintType:btn.dataset.type,constraintP1:'',constraintP2:'',constraintGroupSelected:[]});}
  if(act==='add-constraint'){
    const p1=parseInt(ui.constraintP1),p2=parseInt(ui.constraintP2);if(!p1||!p2||p1===p2)return;
    const nc=document.getElementById('c-note')?.value.trim()||'';
    if(STATE.constraints.some(c=>c.type!=='group'&&((c.p1===p1&&c.p2===p2)||(c.p1===p2&&c.p2===p1)))){alert('Constraint already exists.');return;}
    saveAndSet('golf:constraints',[...STATE.constraints,{id:Date.now(),type:ui.constraintType,p1,p2,note:nc}],'constraints');
    setUI({constraintP1:'',constraintP2:'',constraintNote:''});
  }
  if(act==='add-group-constraint'){
    const sel=ui.constraintGroupSelected;
    if(sel.length<2||sel.length>4){alert('Please select 2–4 players.');return;}
    const nc=document.getElementById('group-note')?.value.trim()||'';
    saveAndSet('golf:constraints',[...STATE.constraints,{id:Date.now(),type:'group',members:[...sel],note:nc}],'constraints');
    setUI({constraintGroupSelected:[],constraintGroupNote:''});
  }
  if(act==='remove-constraint'){saveAndSet('golf:constraints',STATE.constraints.filter(c=>c.id!==parseInt(btn.dataset.id)),'constraints');}
  if(act==='clear-constraints'){if(confirm('Clear all constraints?'))saveAndSet('golf:constraints',[],'constraints');}

  // Tee Times
  if(act==='tee-3first'){const v=btn.dataset.val==='true';setUI({tee3First:v});if(STATE.teeGroups.length>0)reorderTeeGroups(v);}
  if(act==='auto-assign'){doAutoAssign();}
  if(act==='clear-tee'){if(STATE.teeGroups.length>0)saveAndSet('golf:teeGroups',[],'teeGroups');}
  if(act==='copy-wa'){doCopyWA();}

  // League
  if(act==='reset-season-ask'){setUI({leagueResetConfirm:true});}
  if(act==='reset-season-cancel'){setUI({leagueResetConfirm:false});}
  if(act==='reset-season-confirm'){saveAndSet('golf:league',{},'leagueData');setUI({leagueResetConfirm:false});}

  // Competition management
  if(act==='comp-add'){
    const label=STATE.ui.compAddLabel.trim();if(!label)return;
    const pay=Math.max(0,parseFloat(STATE.ui.compAddPay)||0);
    const count=Math.max(1,Math.min(4,parseInt(STATE.ui.compAddCount)||1));
    const id='custom_'+Date.now();
    const existing=competitions();
    save('golf:competitions',[...existing,{id,label,winnersPay:pay,winnersCount:count}]);
    setUI({compAddLabel:'',compAddPay:'0',compAddCount:'1',competitionType:id,selectedWinners:[]});
  }
  if(act==='comp-remove'){
    const removeId=STATE.ui.compRemoveId;if(!removeId)return;
    const updated=competitions().filter(c=>c.id!==removeId);
    save('golf:competitions',updated);
    const newType=updated.length>0?updated[0].id:DEFAULT_COMPETITIONS[0].id;
    setUI({compRemoveId:'',competitionType:newType,selectedWinners:[]});
  }
  // Finance
  if(act==='kitty-add-pending'){setUI({finKittyPending:true});}
  if(act==='kitty-add-cancel'){setUI({finKittyPending:false});}
  if(act==='add-normal-kitty'){
    const kc=kittyCalc();
    const bar=parseFloat(STATE.ui.kittyBarBill)||0;
    // Recalc winner discount using Results page winners
    const comp2=competitions().find(c=>c.id===STATE.ui.competitionType)||competitions()[0];
    const dpw2=comp2?.id==='individual_winners_free'?ENTRY_FEE:ENTRY_FEE/2;
    const wCount=STATE.ui.selectedWinningGroup
      ?(STATE.teeGroups.find(g=>g.id===parseInt(STATE.ui.selectedWinningGroup))?.members.length||0)
      :(STATE.ui.selectedWinners?.filter(Boolean).length||0);
    const disc2=wCount*dpw2;
    const netMf2=Math.max(0,kc.mf-disc2);
    const toAdd=Math.max(0,parseFloat((kc.gRem+kc.nRem+netMf2-bar).toFixed(2)));
    saveAndSet('golf:kitty',parseFloat((STATE.kitty+toAdd).toFixed(2)),'kitty');
    setUI({finAdded:true,finKittyPending:false});
  }
});

document.addEventListener('change',ev=>{
  const el=ev.target;const act=el.dataset.action;
  if(act==='toggle'){const id=parseInt(el.dataset.id),field=el.dataset.field;saveAndSet('golf:players',STATE.players.map(p=>p.id===id?{...p,[field]:el.checked}:p),'players');}
  if(act==='score-input'){
    const pid=parseInt(el.dataset.pid),hole=parseInt(el.dataset.hole),type=el.dataset.type,val=el.value;
    if(type==='gross'){const n={...STATE.grossScores,[pid]:[...(STATE.grossScores[pid]||Array(18).fill(''))]};n[pid][hole]=val;saveAndSet('golf:grossScores',n,'grossScores');}
    else if(type==='nett'){const n={...STATE.nettScores,[pid]:[...(STATE.nettScores[pid]||Array(18).fill(''))]};n[pid][hole]=val;saveAndSet('golf:nettScores',n,'nettScores');}
    else{const n={...STATE.normalScores,[pid]:[...(STATE.normalScores[pid]||Array(18).fill(''))]};n[pid][hole]=val;saveAndSet('golf:normalScores',n,'normalScores');}
  }
  if(act==='import-gametype'){setUI({importGameType:el.value,importPlayerId:'',importPaste:'',importPreview:null,importError:'',importDone:false});}
  if(act==='import-player'){setUI({importPlayerId:el.value,importPaste:'',importPreview:null,importError:'',importDone:false});}
  if(act==='tee-start'){setUI({teeStart:el.value});}
  if(act==='tee-competition'){const lbl=competitions().find(c=>c.id===el.value)?.label||el.value;setUI({competitionType:el.value,teeCompetition:lbl,selectedWinners:[],selectedWinningGroup:''});}
  if(act==='ghost-assign'){
    const gid=el.dataset.group; // keep as string — localStorage keys are always strings
    const newG={...STATE.ghostAssignments,[gid]:el.value?parseInt(el.value):null};
    STATE.ghostAssignments=newG;render();  // session-only, not persisted
  }
  if(act==='wa-rules'){setUI({teeCourseRules:el.value});}
  if(act==='wa-today'){setUI({teeTodayRules:el.value});}
  if(act==='fin-format'){setUI({finSfFormat:el.value,finSfWinners:1});}
  if(act==='fin-winners'){setUI({finSfWinners:parseInt(el.value)});}
  if(act==='competition-type'){const lbl2=competitions().find(c=>c.id===el.value)?.label||el.value;setUI({competitionType:el.value,teeCompetition:lbl2,selectedWinners:[],selectedWinningGroup:''});}
  if(act==='constraint-p1'){setUI({constraintP1:el.value});}
  if(act==='constraint-p2'){setUI({constraintP2:el.value});}
  // FIX 1: group player checkbox
  if(act==='group-select'){
    const id=parseInt(el.dataset.id);
    let sel=[...ui.constraintGroupSelected];
    if(el.checked){if(sel.length<4)sel.push(id);}else{sel=sel.filter(x=>x!==id);}
    setUI({constraintGroupSelected:sel});
  }
  if(!act&&el.id==='import-replace'){setUI({playersImportReplace:el.checked});}
  if(act==='winning-group-select'){setUI({selectedWinningGroup:el.value,selectedWinners:[]});}
  if(act==='winner-select'){
    const slot=parseInt(el.dataset.slot);
    const sw=[...(STATE.ui.selectedWinners||[])];
    while(sw.length<=slot)sw.push('');
    sw[slot]=el.value;
    setUI({selectedWinners:sw});
  }
});

document.addEventListener('input',ev=>{
  const el=ev.target;
  if(el.id==='import-paste'){handleImportPaste(el.value);}
  if(el.id==='new-name'){setUI({playersNewName:el.value});}
  if(el.id==='new-hi'){setUI({playersNewHi:el.value});}
  if(el.id==='edit-name'){setUI({playersEditName:el.value});}
  if(el.id==='edit-hi'){setUI({playersEditHi:el.value});}
  // bar-bill handled via oninput on element directly — no setUI to avoid re-render
  if(el.id==='kitty-amt'){setUI({kittyManualOverride:el.value});}
  if(el.id==='c-note'){setUI({constraintNote:el.value});}
  if(el.id==='group-note'){setUI({constraintGroupNote:el.value});}
  if(el.id==='players-import-paste'){setUI({playersImportPaste:el.value});}
});

function handleImportPaste(text){
  const nums=text.trim().split(/[\s,\t\n]+/).map(s=>parseInt(s.trim())).filter(n=>!isNaN(n));
  let err='',preview=null;
  if(text.trim()){
    if(nums.length===0){err='No numbers found.';}
    else if(nums.length<18){err=`Only ${nums.length} scores found — need 18.`;}
    else{
      if(nums.length>18)err=`${nums.length} numbers found — only first 18 used.`;
      const s18=nums.slice(0,18);
      const inv=s18.filter(n=>n<1||n>15);if(inv.length>0)err=`Unusual scores: ${inv.join(', ')} — check these.`;
      preview=s18;
    }
  }
  setUI({importPaste:text,importPreview:preview,importError:err,importDone:false});
}

function reorderTeeGroups(threeBallsFirst){
  const sorted=[...STATE.teeGroups].sort((a,b)=>threeBallsFirst?a.members.length-b.members.length:b.members.length-a.members.length);
  const[h,m]=STATE.ui.teeStart.split(':').map(Number);let mins=h*60+m;
  saveAndSet('golf:teeGroups',sorted.map((g,idx)=>{const th=String(Math.floor(mins/60)).padStart(2,'0'),tm=String(mins%60).padStart(2,'0');mins+=INTERVAL_MINS;return{...g,id:idx+1,time:`${th}:${tm}`};}),'teeGroups');
}

function doAutoAssign(){
  const{players,constraints,ui}=STATE;
  const active=players.filter(p=>p.playGross||p.playNett||p.playNormal);
  const togetherC=constraints.filter(c=>c.type==='together');
  const groupC=constraints.filter(c=>c.type==='group');   // FIX 1: honour group constraints
  const apartC=constraints.filter(c=>c.type==='apart');
  const sizes=buildGroupSizes(active.length,ui.tee3First);
  if(!sizes.length)return;
  const groups=sizes.map(s=>({slots:s,members:[]}));
  const placed=new Set();

  // Place group constraints first
  groupC.forEach(c=>{
    const mems=c.members.map(id=>active.find(p=>p.id===id)).filter(Boolean);
    if(mems.some(p=>placed.has(p.id)))return;
    const g=groups.find(g=>g.members.length+mems.length<=g.slots);
    if(g){mems.forEach(p=>{g.members.push(p);placed.add(p.id);});}
  });
  // Place pair constraints
  togetherC.forEach(c=>{
    const a=active.find(p=>p.id===c.p1),b=active.find(p=>p.id===c.p2);
    if(!a||!b||placed.has(a.id)||placed.has(b.id))return;
    const g=groups.find(g=>g.members.length+2<=g.slots);
    if(g){g.members.push(a,b);placed.add(a.id);placed.add(b.id);}
  });
  // Shuffle remaining
  active.filter(p=>!placed.has(p.id)).sort(()=>Math.random()-.5).forEach(player=>{
    const safe=groups.find(g=>g.members.length<g.slots&&!g.members.some(m=>apartC.some(c=>(c.p1===player.id&&c.p2===m.id)||(c.p2===player.id&&c.p1===m.id))));
    if(safe){safe.members.push(player);}
    else{
      const ws=groups.filter(g=>g.members.length<g.slots);if(!ws.length)return;
      const best=ws.reduce((b,g)=>{const cf=g.members.filter(m=>apartC.some(c=>(c.p1===player.id&&c.p2===m.id)||(c.p2===player.id&&c.p1===m.id))).length;const bcf=b.members.filter(m=>apartC.some(c=>(c.p1===player.id&&c.p2===m.id)||(c.p2===player.id&&c.p1===m.id))).length;return cf<bcf?g:b;});
      best.members.push(player);
    }
  });
  const[h,m]=ui.teeStart.split(':').map(Number);let mins=h*60+m;
  saveAndSet('golf:teeGroups',groups.map((g,idx)=>{const th=String(Math.floor(mins/60)).padStart(2,'0'),tm=String(mins%60).padStart(2,'0');mins+=INTERVAL_MINS;return{id:idx+1,time:`${th}:${tm}`,members:g.members.map(p=>p.id)};}),'teeGroups');
}

function doCopyWA(){
  const preview=document.getElementById('wa-preview')?.textContent||'';
  navigator.clipboard.writeText(preview).then(()=>{setUI({teeCopied:true});setTimeout(()=>setUI({teeCopied:false}),3000);}).catch(()=>{
    const ta=document.createElement('textarea');ta.value=preview;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.focus();ta.select();document.execCommand('copy');document.body.removeChild(ta);
    setUI({teeCopied:true});setTimeout(()=>setUI({teeCopied:false}),3000);
  });
}

render();
</script>
