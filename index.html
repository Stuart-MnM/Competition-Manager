<title>Desert Springs — Competition Manager</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --gd:#1a3c2e;--gm:#2d5a42;--gl:#3d7a5a;--gp:#e8f0eb;
  --cr:#f5f0e8;--cd:#e8e0d0;--go:#c9a84c;--gl2:#e8c870;
  --wh:#fafaf8;--td:#1a2018;--tm:#4a5c42;--tl:#8a9a84;
  --rd:#c0392b;--sh:0 4px 24px rgba(26,60,46,.12);
}
body{font-family:'DM Sans',sans-serif;background:var(--gd);color:var(--td);min-height:100vh;}
.app{min-height:100vh;display:flex;flex-direction:column;}

/* ── Header & Nav ── */
.hdr{background:linear-gradient(135deg,var(--gd),var(--gm));padding:15px 26px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--go);position:sticky;top:0;z-index:200;}
.hdr-brand{display:flex;align-items:center;gap:11px;}
.hdr-icon{font-size:24px;}
.hdr-title{font-family:'Playfair Display',serif;color:var(--cr);font-size:1.25rem;font-weight:700;line-height:1.1;}
.hdr-sub{color:var(--go);font-size:.66rem;letter-spacing:2px;text-transform:uppercase;}
.hdr-date{color:var(--cd);font-size:.76rem;}
.nav{background:var(--gm);display:flex;padding:0 26px;border-bottom:1px solid rgba(201,168,76,.3);overflow-x:auto;flex-shrink:0;position:sticky;top:62px;z-index:190;}
.nb{padding:10px 16px;border:none;background:none;cursor:pointer;color:var(--cd);font-family:'DM Sans',sans-serif;font-size:.79rem;font-weight:500;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;}
.nb:hover{color:var(--gl2);}
.nb.act{color:var(--go);border-bottom-color:var(--go);}

/* ── FIX 7 & 8: sticky page heading bar ── */
.main{flex:1;background:var(--cr);}
.page{padding:0;max-width:1200px;margin:0 auto;}
.ph{padding:18px 26px 14px;background:var(--cr);position:sticky;top:104px;z-index:180;border-bottom:1px solid var(--cd);margin-bottom:18px;}
.pt{font-family:'Playfair Display',serif;font-size:1.6rem;color:#1a2018;font-weight:700;}
.ps{color:var(--tl);font-size:.82rem;margin-top:2px;}
.page-body{padding:0 26px 26px;}

/* ── Cards & common ── */
.card{background:var(--wh);border-radius:12px;box-shadow:var(--sh);padding:20px;margin-bottom:16px;}
.ct{font-family:'Playfair Display',serif;font-size:.98rem;color:var(--gd);margin-bottom:13px;border-bottom:1px solid var(--cd);padding-bottom:8px;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 15px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.81rem;font-weight:500;transition:all .2s;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.bp{background:var(--gd);color:var(--cr);}

// ─── Golf helpers ─────────────────────────────────────────────────────────────
function calcCourseHcp(hi){return Math.round(hi*(COURSE.slope/113)+(COURSE.rating-COURSE.par));}
function strokesOnHole(chcp,h){const si=STROKE_INDEX[h];if(chcp<=0)return 0;return chcp>=si?1+Math.floor((chcp-si)/18):0;}
function calcSkins(players,scores){
  const sk={};players.forEach(p=>(sk[p.id]=0));let carry=1;
  for(let h=0;h<18;h++){
    const hs=players.map(p=>{const s=scores[p.id]?.[h];return(s!=null&&s!=='')?(parseInt(s)||null):null;});
    const valid=hs.filter(s=>s!==null);if(!valid.length){carry++;continue;}
    const mn=Math.min(...valid);const wins=players.filter((_,i)=>hs[i]===mn);
    if(wins.length===1){sk[wins[0].id]+=carry;carry=1;}else carry++;
  }
  return sk;
}
function calcNettSkins(players,grossScores){
  const ns={};
  players.forEach(p=>{const chcp=calcCourseHcp(p.hi);ns[p.id]=HOLES.map((_,h)=>{const g=grossScores[p.id]?.[h];return(g==null||g==='')?null:parseInt(g)-strokesOnHole(chcp,h);});});
  return calcSkins(players,ns);
}
function calcStableford(gross,par,strokes){
  if(gross==null||gross===''||isNaN(parseInt(gross)))return null;
  return Math.max(0,par-parseInt(gross)+strokes+2);
}
function buildGroupSizes(total,threeBallsFirst=true){
  if(!total)return[];
  const rem=total%4;let num4,num3;
  if(rem===0){num4=total/4;num3=0;}
  else if(rem===1){num3=3;num4=(total-9)/4;if(num4<0){num4=0;num3=total;}}
  else if(rem===2){num3=2;num4=(total-6)/4;if(num4<0){num4=0;num3=total;}}
  else{num3=1;num4=(total-3)/4;}
  if(num4<0||!Number.isInteger(num4)||!Number.isInteger(num3)){
    num4=0;num3=Math.floor(total/3);const lo=total%3;
    const sz=Array(num3).fill(3);if(lo>0)sz[sz.length-1]+=lo;
    return threeBallsFirst?sz.sort((a,b)=>a-b):sz.sort((a,b)=>b-a);
  }
  const sz=[...Array(num4).fill(4),...Array(num3).fill(3)];
  return threeBallsFirst?sz.sort((a,b)=>a-b):sz.sort((a,b)=>b-a);
}
function nextGameDate(){const d=new Date(),dow=d.getDay();const days=dow<=2?2-dow:dow<=4?4-dow:9-dow;const next=new Date(d);next.setDate(d.getDate()+days);return next.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});}
function fmtDate(){return new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}

// Returns true if the current competition is a team game format
function isTeamGame(compId){
  return compId==='best3from4_winners_pay'||compId==='team_best3_par3_pays'||compId==='team_best3_par3_all'||
    (competitions().find(c=>c.id===compId)?.winnersCount||0)>=4;
}

// Calculate best-3-from-4 Stableford team score for a group
// members: array of player IDs (up to 4 incl ghost)
// normalScores: the scores state
// returns: {total, holeScores[18]}
function calcTeamScore(memberIds,ghostId,normalScores,players){
  const allIds=[...memberIds];
  if(ghostId&&!allIds.includes(parseInt(ghostId)))allIds.push(parseInt(ghostId));
  const holeScores=[];
  let total=0;
  for(let h=0;h<18;h++){
    const holePts=allIds.map(pid=>{
      const p=players.find(q=>q.id===pid);if(!p)return 0;
      const chcp=calcCourseHcp(p.hi);
      const sc=normalScores[pid]?.[h];
      return calcStableford(sc,PAR[h],strokesOnHole(chcp,h))??0;
    }).sort((a,b)=>b-a).slice(0,3);
    const hTotal=holePts.reduce((a,b)=>a+b,0);
    holeScores.push(hTotal);
    total+=hTotal;
  }
  return{total,holeScores};
}

function kittyCalc(){
  const {players,grossScores,nettScores,normalScores,kitty,ui}=STATE;
  const gp=players.filter(p=>p.playGross),np=players.filter(p=>p.playNett),mp=players.filter(p=>p.playNormal);
  const gSkins=calcSkins(gp,grossScores),nSkins=calcNettSkins(np,nettScores);
  const tgs=Object.values(gSkins).reduce((a,b)=>a+b,0),tns=Object.values(nSkins).reduce((a,b)=>a+b,0);
  const gf=gp.length*ENTRY_FEE,nf=np.length*ENTRY_FEE,mf=mp.length*ENTRY_FEE;
  const gsv=gp.length&&tgs>0?Math.floor(gf/tgs):0,nsv=np.length&&tns>0?Math.floor(nf/tns):0;
  const gRem=gf-(gsv*tgs),nRem=nf-(nsv*tns);
  const sfTotals={};
  mp.forEach(p=>{const chcp=calcCourseHcp(p.hi);sfTotals[p.id]=HOLES.reduce((t,_,h)=>t+(calcStableford(normalScores[p.id]?.[h],PAR[h],strokesOnHole(chcp,h))??0),0);});
  const sfSorted=[...mp].sort((a,b)=>(sfTotals[b.id]||0)-(sfTotals[a.id]||0));
  const dpw=ui.finSfFormat==='individual'?ENTRY_FEE:ENTRY_FEE/2;
  const totalDisc=ui.finSfWinners*dpw,netMf=Math.max(0,mf-totalDisc);
  const barBill=parseFloat(ui.kittyBarBill)||0;
  const suggested=parseFloat((gRem+nRem+netMf-barBill).toFixed(2));
  return{gp,np,mp,gSkins,nSkins,tgs,tns,gf,nf,mf,gsv,nsv,gRem,nRem,sfTotals,sfSorted,dpw,totalDisc,netMf,barBill,suggested};
}

  const clearBtn=total>0?(ui.playersClearConfirm
    ?`<div class="confirm-strip"><span class="tsm" style="color:var(--rd)">Clear all today's selections?</span><button class="btn bd bsm" data-action="clear-selections-confirm">Yes, clear</button><button class="btn bo bsm" data-action="clear-selections-cancel">Cancel</button></div>`
    :`<button class="btn bd" data-action="clear-selections-ask">✕ Clear Selection</button>`):'';

  return page('Player Register',
    `${players.length} registered · <strong>${total} playing today</strong>${grossCnt>0?` · ${grossCnt} ⛳ Gross`:''}${nettCnt>0?` · ${nettCnt} 🏌️ Nett`:''}${normCnt>0?` · ${normCnt} 🏅 Normal`:''}`,

function parsePlayerImport(text){
  const lines=text.trim().split(/\r?\n/).filter(l=>l.trim());
  const out=[],errs=[];
  lines.forEach((line,i)=>{
    const parts=line.split(/\t|,|  +/).map(s=>s.trim()).filter(Boolean);
    if(parts.length<2){errs.push(`Row ${i+1}: need Name and HI`);return;}
    const name=parts[0],hi=parseFloat(parts[1]);
    if(!name){errs.push(`Row ${i+1}: empty name`);return;}
    if(isNaN(hi)||hi<0||hi>54){errs.push(`Row ${i+1}: bad handicap "${parts[1]}"`);return;}
    out.push({name,hi});
  });
  return{players:out,errors:errs};
}

function renderScoreGrid(players,scores,type){
  if(!players.length) return`<div class="card"><div class="es"><div class="ei">👥</div><div>No ${type==='gross'?'⛳ Gross':type==='nett'?'🏌️ Nett':'🏅 Normal'} players selected.</div><div class="tsm tmu mt8">Go to Players tab and toggle players on.</div></div></div>`;
  const isNormal=type==='normal';

  // FIX 4: added Total column

  let html=`<div class="card" style="padding:14px;overflow-x:auto">

      <span style="background:#d4edda;padding:2px 8px;border-radius:4px;font-weight:600">≥4 pts (Eagle/better)</span>
      <span style="background:#e8f4f0;padding:2px 8px;border-radius:4px;font-weight:600">3 pts (Birdie)</span>
      <span style="background:#eaf4ff;padding:2px 8px;border-radius:4px;font-weight:600">2 pts (Par)</span>
      <span style="background:#fff3cd;padding:2px 8px;border-radius:4px">1 pt (Bogey)</span>
      <span style="background:#fde8e8;padding:2px 8px;border-radius:4px;color:var(--rd)">0 pts</span>
      <span style="color:var(--go);font-size:.65rem">• dots = strokes received</span>

    </div>`}
    <div class="score-grid hrow" style="${colStyle}">
      <div class="sc sn">Player</div>
      ${HOLES.map(h=>`<div class="sc">${h}</div>`).join('')}
      <div class="sc">Out</div><div class="sc">In</div><div class="sc">Total</div>${isNormal?'':'<div class="sc" style="font-size:.65rem;color:var(--gl2)">Skins</div>'}<div class="sc">${isNormal?'Pts':''}</div>
    </div>
    <div class="score-grid srow" style="${colStyle}">
      <div class="sc sn" style="padding-left:8px">Par</div>
      ${PAR.map(p=>`<div class="sc">${p}</div>`).join('')}
      <div class="sc">${PAR.slice(0,9).reduce((a,b)=>a+b,0)}</div>
      <div class="sc">${PAR.slice(9).reduce((a,b)=>a+b,0)}</div>
      <div class="sc">${PAR.reduce((a,b)=>a+b,0)}</div>
      ${isNormal?'':'<div class="sc">—</div>'}<div class="sc">${isNormal?'—':''}</div>
    </div>
    <div class="score-grid srow" style="${colStyle}">
      <div class="sc sn" style="padding-left:8px">Stroke Index</div>
      ${STROKE_INDEX.map(si=>`<div class="sc">${si}</div>`).join('')}
      <div class="sc">—</div><div class="sc">—</div><div class="sc">—</div>${isNormal?'':'<div class="sc">—</div>'}<div class="sc">${isNormal?'—':''}</div>
    </div>`;

  // Track totals for summary row
  const playerTotals=[];
  players.forEach(p=>{
    const ps=scores[p.id]||Array(18).fill('');
    const chcp=calcCourseHcp(p.hi);
    const out=ps.slice(0,9).reduce((a,v)=>a+(parseInt(v)||0),0);
    const inn=ps.slice(9).reduce((a,v)=>a+(parseInt(v)||0),0);
    const total=out+inn;
    const sfPts=isNormal?HOLES.reduce((tot,_,h)=>tot+(calcStableford(ps[h],PAR[h],strokesOnHole(chcp,h))??0),0):0;
    const playerSkins=isNormal?0:HOLES.reduce((sk,_,h)=>{
      const allSk=players.map(q=>parseInt(scores[q.id]?.[h])).filter(v=>!isNaN(v));
      if(!allSk.length)return sk;const mn=Math.min(...allSk);const val=parseInt(ps[h]);
      return sk+(val===mn&&allSk.filter(v=>v===mn).length===1?1:0);
    },0);
    playerTotals.push({out,inn,total,sfPts,playerSkins});

    html+=`<div class="score-grid prow" style="${colStyle}">
      <div class="sc sn" style="flex-direction:column;align-items:flex-start;gap:1px;padding-left:6px">

        <span style="font-size:.64rem;color:var(--tl)">Hcp ${chcp}</span>
      </div>`;
    HOLES.forEach((_,h)=>{
      const gross=ps[h]??'';
      const strokes=strokesOnHole(chcp,h);
      const allS=players.map(q=>parseInt(scores[q.id]?.[h])).filter(v=>!isNaN(v));
      const minS=allS.length?Math.min(...allS):Infinity;
      const isSkin=!isNormal&&allS.length>0&&parseInt(gross)===minS&&players.filter(q=>parseInt(scores[q.id]?.[h])===minS).length===1;
      const pts=isNormal?calcStableford(gross,PAR[h],strokes):null;
      // Par (2pts) now gets a light blue so no hole is invisible
      const sfCol=pts===null?'':pts>=4?'#d4edda':pts===3?'#e8f4f0':pts===2?'#eaf4ff':pts===1?'#fff3cd':'#fde8e8';
      html+=`<div class="sc" style="padding:2px 1px;position:relative;flex-direction:column;gap:0">
        <input class="si${isSkin?' skin-win':''}" style="${sfCol?`background:${sfCol};font-weight:600`:''}"
          type="number" min="1" max="12" value="${e(String(gross))}"
          data-action="score-input" data-pid="${p.id}" data-hole="${h}" data-type="${type}">
        ${isNormal&&pts!==null?`<span style="font-size:.58rem;font-weight:700;color:${pts>=3?'#1a6040':pts===2?'#2255aa':pts===1?'#8a5010':'var(--rd)'};line-height:1;margin-top:1px">${pts}pt</span>`:''}
        ${strokes>0?`<span style="position:absolute;top:1px;right:2px;font-size:.52rem;color:var(--go);line-height:1">${'•'.repeat(Math.min(strokes,2))}</span>`:''}
      </div>`;
    });
    html+=`<div class="sc bld">${out||'—'}</div><div class="sc bld">${inn||'—'}</div>`;
    html+=`<div class="sc bld" style="color:var(--go)">${total||'—'}</div>`;
    if(!isNormal)html+=`<div class="sc bld" style="color:${playerSkins>0?'var(--go)':'var(--tl)'}">${playerSkins>0?playerSkins:'—'}</div>`;
    html+=`<div class="sc bld">${isNormal?(sfPts>0?`<span style="color:var(--gm)">${sfPts}</span>`:'—'):''}</div>`;
    html+=`</div>`;
  });

  // Group totals row removed per user request
  html+=`</div>`;
  return html;
}


// ── Team Game Score Grid — groups in tee time order, with ghost + team totals ──
function renderTeamScoreGrid(mpAll,normalScores){
  const {players,teeGroups,ghostAssignments}=STATE;
  if(!mpAll.length)return`<div class="card"><div class="es"><div class="ei">👥</div><div>No 🏅 Stableford players selected.</div><div class="tsm tmu mt8">Go to Players tab and toggle players on.</div></div></div>`;

  const colStyle=`grid-template-columns:200px repeat(18,minmax(35px,1fr)) 58px 46px`;
  const ghosts=ghostAssignments||{};

  let html=`<div style="margin-bottom:8px">
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;font-size:.72rem;align-items:center">
      <span style="color:var(--tl);font-weight:500">Pts shown below each score · colours:</span>
      <span style="background:#d4edda;padding:2px 8px;border-radius:4px;font-weight:600">≥4 pts</span>
      <span style="background:#e8f4f0;padding:2px 8px;border-radius:4px;font-weight:600">3 pts (Birdie)</span>
      <span style="background:#eaf4ff;padding:2px 8px;border-radius:4px;font-weight:600">2 pts (Par)</span>
      <span style="background:#fff3cd;padding:2px 8px;border-radius:4px">1 pt</span>
      <span style="background:#fde8e8;padding:2px 8px;border-radius:4px;color:var(--rd)">0 pts</span>
      <span style="color:var(--go);font-size:.65rem">• dots = strokes received</span>
    </div>
  </div>`;

  // Process each tee group in order
  teeGroups.forEach(g=>{
    const ghostId=ghosts[g.id]?parseInt(ghosts[g.id]):null;
    const ghostPlayer=ghostId?players.find(p=>p.id===ghostId):null;
    // Members who are playing Stableford
    const groupMp=g.members.map(id=>mpAll.find(p=>p.id===id)).filter(Boolean);
    if(!groupMp.length&&!ghostPlayer)return; // skip groups with no stableford players

    // All IDs for team scoring (real members + ghost)
    const allTeamIds=[...g.members];
    if(ghostId&&!allTeamIds.includes(ghostId))allTeamIds.push(ghostId);

    // Team best-3-from-4 per hole
    const teamHoleScores=[];
    let teamTotal=0;
    for(let h=0;h<18;h++){
      const holePts=allTeamIds.map(pid=>{
        const p=players.find(q=>q.id===pid);if(!p)return 0;
        const chcp=calcCourseHcp(p.hi);
        return calcStableford(normalScores[pid]?.[h],PAR[h],strokesOnHole(chcp,h))??0;
      }).sort((a,b)=>b-a).slice(0,3);
      const ht=holePts.reduce((a,b)=>a+b,0);
      teamHoleScores.push(ht);
      teamTotal+=ht;
    }

    const is3ball=g.members.length===3;
    const ghostSelector=is3ball?`<div style="display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap">
      <span style="font-size:.75rem;color:var(--tm);font-weight:600">👻 Ghost:</span>
      <select class="fi" style="min-width:190px;font-size:.8rem;padding:4px 8px" data-action="ghost-assign" data-group="${g.id}">
        <option value="">— Assign ghost player —</option>
        ${players.filter(p=>p.playNormal&&!g.members.includes(p.id)).map(p=>`<option value="${p.id}" ${ghostId==p.id?'selected':''}>${e(p.name)} (Hcp ${calcCourseHcp(p.hi)})</option>`).join('')}
      </select>
      ${ghostPlayer?`<span style="font-size:.78rem;color:var(--gm);font-weight:600">✓ ${e(ghostPlayer.name)} assigned</span>`:'<span style="font-size:.72rem;color:var(--tl);font-style:italic">Assign after the round at the table</span>'}
    </div>`:'';
    html+=`<div class="card" style="padding:14px;overflow-x:auto;margin-bottom:20px">
      <div class="flex jbs aic mb16" style="flex-wrap:wrap;gap:8px">
        <div style="flex:1">
          <div class="ct" style="margin:0">Group ${g.id} — ${g.time} · ${g.members.length}-ball${ghostPlayer?` + 👻 ${e(ghostPlayer.name)}`:''}</div>
          <div style="font-size:.75rem;color:var(--tl);margin-top:3px">Best 3 from ${allTeamIds.length} · team total: <strong style="color:var(--gd)">${teamTotal||'—'}</strong></div>
          ${ghostSelector}
        </div>
        <button class="btn bd bsm" data-action="clear-scores" data-type="normal">Clear Scores</button>
      </div>
      <div class="score-grid hrow" style="${colStyle}">
        <div class="sc sn">Player</div>
        ${HOLES.map(h=>`<div class="sc">${h}</div>`).join('')}
        <div class="sc">Pts</div><div class="sc" style="font-size:.65rem;color:var(--gl2)">Team</div>
      </div>
      <div class="score-grid srow" style="${colStyle}">
        <div class="sc sn" style="padding-left:8px">Par</div>
        ${PAR.map(p=>`<div class="sc">${p}</div>`).join('')}
        <div class="sc">—</div><div class="sc">—</div>
      </div>
      <div class="score-grid srow" style="${colStyle}">
        <div class="sc sn" style="padding-left:8px">Stroke Index</div>
        ${STROKE_INDEX.map(si=>`<div class="sc">${si}</div>`).join('')}
        <div class="sc">—</div><div class="sc">—</div>
      </div>`;

    // Real players in the group
    const allDisplayPlayers=[...groupMp];
    if(ghostPlayer&&mpAll.find(p=>p.id===ghostId))allDisplayPlayers.push({...ghostPlayer,isGhost:true});

    allDisplayPlayers.forEach(p=>{
      const ps=normalScores[p.id]||Array(18).fill('');
      const chcp=calcCourseHcp(p.hi);
      const sfPts=HOLES.reduce((tot,_,h)=>tot+(calcStableford(ps[h],PAR[h],strokesOnHole(chcp,h))??0),0);
      html+=`<div class="score-grid prow" style="${colStyle};${p.isGhost?'background:#f5f0ff;':''}" >
        <div class="sc sn" style="flex-direction:column;align-items:flex-start;gap:1px;padding-left:6px">
          <span style="font-weight:600;font-size:.78rem">${p.isGhost?'👻 ':''  }${e(p.name)}${p.isGhost?' <span style="font-size:.65rem;color:#7c5cbf">(ghost)</span>':''}</span>
          <span style="font-size:.64rem;color:var(--tl)">Hcp ${chcp}</span>
        </div>`;
      HOLES.forEach((_,h)=>{
        const gross=ps[h]??'';
        const strokes=strokesOnHole(chcp,h);
        const pts=calcStableford(gross,PAR[h],strokes);
        const sfCol=pts===null?'':pts>=4?'#d4edda':pts===3?'#e8f4f0':pts===2?'#eaf4ff':pts===1?'#fff3cd':'#fde8e8';
        // Ghost scores are read-only
        if(p.isGhost){
          html+=`<div class="sc" style="padding:2px 1px;position:relative;flex-direction:column;gap:0;background:${sfCol||'#f5f0ff'}">
            <span style="font-size:.8rem;font-weight:600;color:var(--td)">${gross||'—'}</span>
            ${pts!==null?`<span style="font-size:.58rem;font-weight:700;color:${pts>=3?'#1a6040':pts===2?'#2255aa':pts===1?'#8a5010':'var(--rd)'};line-height:1">${pts}pt</span>`:''}
            ${strokes>0?`<span style="position:absolute;top:1px;right:2px;font-size:.52rem;color:var(--go);line-height:1">${'•'.repeat(Math.min(strokes,2))}</span>`:''}
          </div>`;
        } else {
          html+=`<div class="sc" style="padding:2px 1px;position:relative;flex-direction:column;gap:0">
            <input class="si" style="${sfCol?`background:${sfCol};font-weight:600`:''}"
              type="number" min="1" max="12" value="${e(String(gross))}"
              data-action="score-input" data-pid="${p.id}" data-hole="${h}" data-type="normal">
            ${pts!==null?`<span style="font-size:.58rem;font-weight:700;color:${pts>=3?'#1a6040':pts===2?'#2255aa':pts===1?'#8a5010':'var(--rd)'};line-height:1;margin-top:1px">${pts}pt</span>`:''}
            ${strokes>0?`<span style="position:absolute;top:1px;right:2px;font-size:.52rem;color:var(--go);line-height:1">${'•'.repeat(Math.min(strokes,2))}</span>`:''}
          </div>`;
        }
      });
      html+=`<div class="sc bld" style="color:${sfPts>0?'var(--gm)':'var(--tl)'}">${sfPts||'—'}</div>`;
      html+=`<div class="sc"></div></div>`;
    });

    // Team best-3 row
    html+=`<div class="score-grid trow" style="${colStyle}">
      <div class="sc sn" style="padding-left:8px;font-size:.72rem;letter-spacing:.5px">BEST 3 FROM ${allTeamIds.length}</div>
      ${teamHoleScores.map(s=>`<div class="sc" style="color:var(--gl2)">${s||'—'}</div>`).join('')}
      <div class="sc" style="color:var(--gl2)">${teamTotal||'—'}</div>
      <div class="sc"></div>
    </div>`;

    html+=`</div>`;
  });

  return html;
}

function renderLiveSnapshot(){
  const {players,grossScores,nettScores,normalScores}=STATE;
  const gp=players.filter(p=>p.playGross),np=players.filter(p=>p.playNett),mp=players.filter(p=>p.playNormal);
  const gSkins=calcSkins(gp,grossScores),nSkins=calcNettSkins(np,nettScores);
  const sfTotals={};
  mp.forEach(p=>{const chcp=calcCourseHcp(p.hi);sfTotals[p.id]=HOLES.reduce((t,_,h)=>t+(calcStableford(normalScores[p.id]?.[h],PAR[h],strokesOnHole(chcp,h))??0),0);});
  const holesIn=(sc,pl)=>!pl.length?0:Math.max(...pl.map(p=>(sc[p.id]||[]).filter(v=>v!==''&&v!=null).length));
  function section(title,pList,skinsMap,sfMap,hi){
    if(!pList.length)return`<div class="card"><div class="tmu tsm" style="text-align:center;padding:16px">No players selected.</div></div>`;
    const sorted=[...pList].sort((a,b)=>sfMap?(sfMap[b.id]||0)-(sfMap[a.id]||0):(skinsMap[b.id]||0)-(skinsMap[a.id]||0));
    let rows='';
    sorted.forEach((p,i)=>{
      const scObj=sfMap?normalScores:skinsMap===gSkins?grossScores:nettScores;
      const ps=scObj[p.id]||[];const gross=ps.reduce((a,v)=>a+(parseInt(v)||0),0);
      const nettTotal=gross>0?gross-calcCourseHcp(p.hi):null;
      const skins=skinsMap?.[p.id]||0,pts=sfMap?.[p.id]||0;const lead=i===0&&(skins>0||pts>0);
      rows+=`<tr style="border-bottom:1px solid var(--cd);${lead?'background:#fffbf0':''}">
        <td style="padding:7px 8px;font-weight:600">${lead?'🏆 ':''}${e(p.name)}</td>
        <td style="text-align:center">${gross||'—'}</td>
        ${skinsMap?`<td style="text-align:center"><span class="sn2">${skins||'—'}</span></td>`:''}
        ${sfMap?`<td style="text-align:center"><span class="sn2">${pts||'—'}</span></td>`:''}
        ${skinsMap?`<td style="text-align:center;color:var(--tm)">${nettTotal??'—'}</td>`:''}
      </tr>`;
    });
    return`<div class="card"><div class="ct">${title} <span class="tsm tmu" style="font-weight:400">— ${hi} hole${hi!==1?'s':''} played</span></div>
      <table style="width:100%;font-size:.84rem;border-collapse:collapse">
        <thead><tr style="border-bottom:2px solid var(--cd)">
          <th style="text-align:left;padding:5px 8px;color:var(--tm)">Player</th>
          <th style="text-align:center;padding:5px 8px;color:var(--tm)">Gross</th>
          ${skinsMap?'<th style="text-align:center;padding:5px 8px;color:var(--tm)">Skins</th>':''}
          ${sfMap?'<th style="text-align:center;padding:5px 8px;color:var(--tm)">Pts</th>':''}
          ${skinsMap?'<th style="text-align:center;padding:5px 8px;color:var(--tm)">Nett Total</th>':''}
        </tr></thead><tbody>${rows}</tbody>
      </table></div>`;
  }
  return`<div><div class="card" style="background:var(--gd);border-radius:10px;margin-bottom:16px"><div style="color:var(--go);font-family:'Playfair Display',serif;font-size:.9rem;font-weight:700">⚡ Live — updates as scores are entered</div></div>
    ${gp.length>0?section('⛳ Gross Skins',gp,gSkins,null,holesIn(grossScores,gp)):''}
    ${np.length>0?section('🏌️ Nett Skins',np,nSkins,null,holesIn(nettScores,np)):''}
    ${mp.length>0?section('🏅 Stableford',mp,null,sfTotals,holesIn(normalScores,mp)):''}
  </div>`;
}

function renderQuickImport(){
  const {players,grossScores,nettScores,normalScores,ui}=STATE;
  // Auto-correct game type if no players in current selection
  let gt=ui.importGameType;
  const hasGross=players.some(p=>p.playGross),hasNett=players.some(p=>p.playNett),hasNormal=players.some(p=>p.playNormal);
  if(gt==='gross'&&!hasGross){gt=hasNett?'nett':hasNormal?'normal':'gross';}
  else if(gt==='nett'&&!hasNett){gt=hasGross?'gross':hasNormal?'normal':'nett';}
  else if(gt==='normal'&&!hasNormal){gt=hasGross?'gross':hasNett?'nett':'normal';}
  if(gt!==ui.importGameType)STATE.ui.importGameType=gt;
  const playersForGame=gt==='gross'?players.filter(p=>p.playGross):gt==='nett'?players.filter(p=>p.playNett):players.filter(p=>p.playNormal);
  const selP=players.find(p=>p.id===parseInt(ui.importPlayerId));
  let previewHtml='';
  if(ui.importPreview&&selP){
    const prev=ui.importPreview,chcp=calcCourseHcp(selP.hi);
    const nettPrev=prev.map((g,h)=>g-strokesOnHole(chcp,h));
    const outG=prev.slice(0,9).reduce((a,b)=>a+b,0),inG=prev.slice(9).reduce((a,b)=>a+b,0);
    const outN=nettPrev.slice(0,9).reduce((a,b)=>a+b,0),inN=nettPrev.slice(9).reduce((a,b)=>a+b,0);
    previewHtml=`<div style="margin-bottom:14px"><div class="tsm tmu" style="margin-bottom:8px">Preview for <strong>${e(selP.name)}</strong></div>
      <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:.78rem;min-width:700px">
        <thead><tr style="background:var(--gd);color:var(--cr)"><td style="padding:6px 8px;font-weight:600">Hole</td>${HOLES.map(h=>`<td style="text-align:center;padding:6px 4px">${h}</td>`).join('')}<td style="text-align:center;padding:6px 8px">Out</td><td style="text-align:center;padding:6px 8px">In</td><td style="text-align:center;padding:6px 8px">Total</td></tr></thead>
        <tbody>
          <tr style="background:var(--gp)"><td style="padding:6px 8px;font-weight:600">Gross</td>${prev.map((s,i)=>`<td style="text-align:center;padding:5px 2px;font-weight:600;color:${s>PAR[i]+2?'var(--rd)':s<=PAR[i]-1?'var(--gm)':'var(--td)'}">${s}</td>`).join('')}<td style="text-align:center;font-weight:700">${outG}</td><td style="text-align:center;font-weight:700">${inG}</td><td style="text-align:center;font-weight:700;color:var(--gd)">${outG+inG}</td></tr>
          <tr><td style="padding:6px 8px;font-weight:600;color:var(--tm)">Nett</td>${nettPrev.map((s,i)=>{const st=strokesOnHole(chcp,i);return`<td style="text-align:center;padding:5px 2px;color:var(--tm);font-size:.75rem">${s}${st>0?`<sup style="color:var(--go)">${'•'.repeat(st)}</sup>`:''}</td>`;}).join('')}<td style="text-align:center;color:var(--tm)">${outN}</td><td style="text-align:center;color:var(--tm)">${inN}</td><td style="text-align:center;font-weight:700;color:var(--tm)">${outN+inN}</td></tr>
        </tbody>
      </table></div></div>`;
  }
  return`<div class="card" style="border-left:4px solid var(--go)">
    <div class="ct">⚡ Quick Import — paste 18 scores for one player</div>
    <div class="fr" style="margin-bottom:14px">
      <div class="fg"><label class="fl">Game</label>
        <select class="fi" style="width:130px" data-action="import-gametype">
          ${players.some(p=>p.playGross)?`<option value="gross" ${gt==='gross'?'selected':''}>⛳ Gross</option>`:''}
          ${players.some(p=>p.playNett)?`<option value="nett" ${gt==='nett'?'selected':''}>🏌️ Nett</option>`:''}
          ${players.some(p=>p.playNormal)?`<option value="normal" ${gt==='normal'?'selected':''}>🏅 Normal</option>`:''}
        </select>
      </div>
      <div class="fg"><label class="fl">Player <span class="tmu" style="font-weight:400">(${playersForGame.length} in this game)</span></label>
        <select class="fi import-player-select" id="import-player" data-action="import-player">
          <option value="">Select player…</option>
          ${playersForGame.map(p=>`<option value="${p.id}" ${ui.importPlayerId==p.id?'selected':''}>${e(p.name)} — Hcp ${calcCourseHcp(p.hi)}</option>`).join('')}
        </select>
      </div>
    </div>
    ${playersForGame.length===0?`<div style="color:var(--rd);font-size:.82rem;margin-bottom:12px;padding:8px 12px;background:#fdf0ef;border-radius:8px">⚠️ No players assigned to ${gt} today.</div>`:''}
    <div class="fg" style="margin-bottom:14px">
      <label class="fl">Paste scores here (18 numbers)</label>
      <textarea class="fi" id="import-paste" ${!ui.importPlayerId?'disabled':''} placeholder="7  4  7  6  4  4  5  4  5&#10;5  6  3  6  4  6  4  3  5">${e(ui.importPaste)}</textarea>
    </div>
    ${ui.importError?`<div style="color:var(--rd);font-size:.82rem;margin-bottom:12px;padding:8px 12px;background:#fdf0ef;border-radius:8px">⚠️ ${e(ui.importError)}</div>`:''}
    ${previewHtml}
    <div class="flex gap8 aic">
      ${ui.importDone?`<span style="color:var(--gm);font-weight:600">✅ Imported!</span><button class="btn bo bsm" data-action="import-reset">Import another</button>`
        :`<button class="btn bg" data-action="do-import" ${(!ui.importPreview||!ui.importPlayerId)?'disabled':''}>✅ Import for ${selP?e(selP.name):'…'}</button>`}
      ${ui.importPaste&&!ui.importDone?`<button class="btn bd bsm" data-action="import-reset">Clear</button>`:''}
    </div>
  </div>`;
}

function renderScores(){
  const {players,grossScores,nettScores,normalScores,ui}=STATE;
  const gp=players.filter(p=>p.playGross),np=players.filter(p=>p.playNett),mp=players.filter(p=>p.playNormal);
  let inner='';
  if(ui.scoresView==='live') inner=renderLiveSnapshot();
  else if(ui.scoresView==='import') inner=renderQuickImport();
  else{
    const comps=competitions();
    const selComp=comps.find(c=>c.id===ui.competitionType)||comps[0];
    const compCard=`<div class="card" style="border-left:4px solid var(--go);margin-bottom:16px">
      <div class="ct">🏆 Today's Competition</div>
      <div class="flex gap8 aic" style="flex-wrap:wrap;margin-bottom:12px">
        <div class="fg" style="flex:1;min-width:200px">
          <label class="fl">Select competition</label>
          <select class="fi" style="width:100%" data-action="competition-type">
            ${comps.map(c=>`<option value="${c.id}" ${ui.competitionType===c.id?'selected':''}>${e(c.label)} — ${c.winnersPay>0?`Winners pay €${c.winnersPay} today`:'No entry fee today'} (${c.winnersCount} winner${c.winnersCount>1?'s':''})</option>`).join('')}
          </select>
        </div>
        ${selComp?`<div style="background:${selComp.winnersPay>0?'#fffbf0':'#e8f4f0'};border-radius:8px;padding:8px 14px;font-size:.82rem;font-weight:600;color:${selComp.winnersPay>0?'var(--go)':'var(--gm)'}">
          ${selComp.winnersPay>0?`💶 Winners pay €${selComp.winnersPay} today`:'🎉 Individual winner — no entry fee today'}
        </div>`:''}
      </div>
      <details style="margin-top:4px">
        <summary style="cursor:pointer;font-size:.78rem;color:var(--tl);user-select:none">⚙️ Manage competition list</summary>
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--cd)">
          <div class="fl" style="margin-bottom:8px">Add new competition:</div>
          <div class="flex gap8 aic" style="flex-wrap:wrap;margin-bottom:12px">
            <div class="fg"><label class="fl">Name</label><input class="fi" style="width:200px" id="comp-add-label" value="${e(ui.compAddLabel)}" placeholder="e.g. Texas Scramble" oninput="STATE.ui.compAddLabel=this.value"></div>
            <div class="fg"><label class="fl">Winners pay (€, 0=free)</label><input class="fi fn" type="number" min="0" max="50" id="comp-add-pay" value="${ui.compAddPay}" oninput="STATE.ui.compAddPay=this.value"></div>
            <div class="fg"><label class="fl">No. of winners</label><select class="fi fn" id="comp-add-count" onchange="STATE.ui.compAddCount=this.value">${[1,2,3,4].map(n=>`<option value="${n}" ${ui.compAddCount==n?'selected':''}>${n}</option>`).join('')}</select></div>
            <button class="btn bg bsm" data-action="comp-add" ${!ui.compAddLabel.trim()?'disabled':''}>+ Add</button>
          </div>
          ${comps.length>0?`<div class="fl" style="margin-bottom:6px">Remove competition:</div>
          <div class="flex gap8 aic" style="flex-wrap:wrap">
            <select class="fi fm" id="comp-remove-sel" onchange="STATE.ui.compRemoveId=this.value">
              <option value="">Select to remove…</option>
              ${comps.map(c=>`<option value="${c.id}">${e(c.label)}</option>`).join('')}
            </select>
            <button class="btn bd bsm" data-action="comp-remove" ${!ui.compRemoveId?'disabled':''}>Remove</button>
          </div>`:''}
        </div>
      </details>
    </div>`;
    inner=compCard+`<div style="background:#fffbf0;border:1px solid var(--go);border-radius:8px;padding:8px 14px;margin-bottom:12px;font-size:.78rem;color:var(--td)">
      💡 <strong>Tip:</strong> To enter all 18 scores for a player at once, use the <button class="btn bo bsm" style="padding:3px 8px;font-size:.74rem" data-action="scores-view" data-view="import">📋 Import</button> tab — paste space-separated scores in one go.
    </div>
    <div class="flex gap8 mb16">
      <button class="btn ${ui.scoresTab==='gross'?'bg':'bo'}" data-action="scores-tab" data-tab="gross">⛳ Gross${gp.length?` (${gp.length})`:''}</button>
      <button class="btn ${ui.scoresTab==='nett'?'bg':'bo'}" data-action="scores-tab" data-tab="nett">🏌️ Nett${np.length?` (${np.length})`:''}</button>
      <button class="btn ${ui.scoresTab==='normal'?'bg':'bo'}" data-action="scores-tab" data-tab="normal">🏅 Stableford${mp.length?` (${mp.length})`:''}</button>
    </div>`;
    if(ui.scoresTab==='gross') inner+=renderScoreGrid(gp,grossScores,'gross');
    else if(ui.scoresTab==='nett') inner+=renderScoreGrid(np,nettScores,'nett');
    else if(isTeamGame(ui.competitionType)&&STATE.teeGroups.length>0) inner+=renderTeamScoreGrid(mp,normalScores);

  return page('Score Entry','Enter hole-by-hole scores for today\'s round',
    `<div class="flex gap8"><button class="btn ${ui.scoresView==='entry'?'bp':'bo'}" data-action="scores-view" data-view="entry">📝 Entry</button><button class="btn ${ui.scoresView==='import'?'bp':'bo'}" data-action="scores-view" data-view="import">📋 Import</button><button class="btn ${ui.scoresView==='live'?'bp':'bo'}" data-action="scores-view" data-view="live">⚡ Live</button><button class="btn bd bsm" data-action="clear-all-scores" title="Clear all scores from the previous round">🗑 New Round</button></div>`,

}

// RESULTS
// ══════════════════════════════════════════════════════════════════════════════
function renderResults(){
  const {players,grossScores,nettScores,normalScores,ui}=STATE;
  const kc=kittyCalc();
  const{gp,np,mp,gSkins,nSkins,tgs,tns,gsv,nsv,sfTotals}=kc;
  const allActive=players.filter(p=>p.playGross||p.playNett||p.playNormal);
  const comp=competitions().find(c=>c.id===ui.competitionType)||competitions()[0];
  const winnersCount=comp?comp.winnersCount:1;
  const teamGame=isTeamGame(ui.competitionType);
  const teeGroups=STATE.teeGroups||[];
  const ghosts=STATE.ghostAssignments||{};
  const getGhostId=gid=>ghosts[String(gid)]?parseInt(ghosts[String(gid)]):null;
  // Never use selectedWinners for team games — always use selectedWinningGroup
  const sw=teamGame?[]:ui.selectedWinners||[];

  // ── Winner selection — group picker for team games, player dropdowns for pairs/individual ──
  let winnerSelector='';
  let chosenWinners=[];
  let allChosen=false;

  // ── Build group options with team scores (used for leaderboard + winner selector) ──
  const groupOptions=teeGroups.map(g=>{
    const ghostId=getGhostId(g.id);
    const memberIds=g.members.map(id=>parseInt(id));
    const teamScore=calcTeamScore(memberIds,ghostId,normalScores,players);
    const memberPlayers=memberIds.map(id=>players.find(p=>p.id===id)).filter(Boolean);
    const ghostPlayer=ghostId?players.find(p=>p.id===ghostId):null;
    return{g,teamScore,ghostId,ghostPlayer,memberIds,memberPlayers};
  }).sort((a,b)=>b.teamScore.total-a.teamScore.total);

  if(teamGame&&teeGroups.length>0){
    const selGroupId=ui.selectedWinningGroup?parseInt(ui.selectedWinningGroup):null;
    const selGroupData=selGroupId?groupOptions.find(o=>o.g.id===selGroupId):null;

    winnerSelector=`<div class="fg" style="margin-bottom:4px">
      <label class="fl">Winning Group (sorted by team score, highest first)</label>
      <select class="fi" style="width:100%;max-width:520px" data-action="winning-group-select">
        <option value="">— Select winning group —</option>
        ${groupOptions.map(({g,teamScore,memberPlayers,ghostPlayer},idx)=>{
          const names=memberPlayers.map(p=>p.name).join(', ')+(ghostPlayer?`, ${ghostPlayer.name} (ghost)`:'');
          return`<option value="${g.id}" ${selGroupId===g.id?'selected':''}>${idx===0?'🏆 ':''}Group ${g.id} · ${teamScore.total} pts · ${names}</option>`;
        }).join('')}
      </select>
    </div>`;

    if(selGroupData){
      const allWinnerIds=[...selGroupData.memberIds];
      if(selGroupData.ghostId&&!allWinnerIds.includes(selGroupData.ghostId))allWinnerIds.push(selGroupData.ghostId);
      chosenWinners=allWinnerIds.map(id=>({...players.find(p=>p.id===id),isGhost:id===selGroupData.ghostId})).filter(p=>p.id);
      allChosen=true;
    }
  } else {
    // Individual / Pairs: player-by-player dropdowns
    const winnerDropdowns=Array.from({length:winnersCount},(_,i)=>{
      const slotVal=sw[i]||'';
      const otherChosen=sw.filter((_,j)=>j!==i).map(v=>parseInt(v)).filter(Boolean);
      return`<div class="fg">
        <label class="fl">Winner ${i+1}</label>
        <select class="fi" style="min-width:190px" data-action="winner-select" data-slot="${i}">
          <option value="">— Select player —</option>
          ${allActive.map(p=>`<option value="${p.id}" ${slotVal==p.id?'selected':''} ${otherChosen.includes(p.id)?'disabled':''}>${e(p.name)}</option>`).join('')}
        </select>
      </div>`;
    }).join('');
    winnerSelector=winnerDropdowns;
    chosenWinners=sw.slice(0,winnersCount).map(id=>allActive.find(p=>p.id===parseInt(id))).filter(Boolean);
    allChosen=chosenWinners.length===winnersCount;
  }

  const payNote=comp.winnersPay>0?`Pays €${comp.winnersPay} today`:'No entry fee today';
  const payColour=comp.winnersPay>0?'var(--go)':'var(--gm)';
  const winnerSummary=allChosen?`<div style="margin-top:14px;background:${comp.winnersPay>0?'#fffbf0':'#e8f4f0'};border-radius:8px;padding:12px 16px">
    <div style="font-weight:700;color:${payColour};margin-bottom:6px;font-size:.9rem">
      ${comp.winnersPay>0?`💶 Winning team — each player pays €${comp.winnersPay} today`:'🎉 Individual winner — no entry fee today'}
    </div>
    ${teamGame?`<div style="font-size:.78rem;color:var(--tl);margin-bottom:10px">${comp.label}</div>`:''}
    ${chosenWinners.map(p=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--cd);font-size:.85rem">
      <span style="font-weight:600">${p.isGhost?'👻':'🏆'} ${e(p.name)}${p.isGhost?' <span style="font-size:.72rem;color:#7c5cbf;font-weight:400">(ghost — scores only)</span>':''}</span>
      <span style="font-weight:700;color:${p.isGhost?'var(--tl)':payColour}">${p.isGhost?`Pays €${ENTRY_FEE} today (not a winner)`:payNote}</span>
    </div>`).join('')}
    <div style="margin-top:8px;font-size:.78rem;color:var(--tl)">All other players pay the full €${ENTRY_FEE} entry today.</div>
  </div>`:`<div style="margin-top:10px;font-size:.78rem;color:var(--tl)">${teamGame?'Select the winning group above to see their details.':'Select all winners above to see their fee status.'}</div>`;

  const competitionPanel=`<div class="card" style="border-left:4px solid var(--go)">
    <div class="ct">🏆 Competition Results</div>
    <div style="background:var(--gp);border-radius:8px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:12px">
      <span style="font-size:1.2rem">🏌️</span>
      <div>
        <div style="font-weight:700;color:var(--gd);font-size:.95rem">${e(comp?comp.label:'—')}</div>
        <div style="font-size:.75rem;color:var(--tl)">${comp?(comp.winnersPay>0?`${teamGame?'Winning team (4 players)':winnersCount+' winner'+(winnersCount>1?'s':'')} · each pays €${comp.winnersPay} today`:`Winner · no entry fee today`):'—'}</div>
      </div>
      <span style="margin-left:auto;font-size:.72rem;color:var(--tl);font-style:italic">Change on Score Entry page</span>
    </div>
    <div class="flex gap8 aic" style="flex-wrap:wrap;margin-bottom:4px">${winnerSelector}</div>
    ${winnerSummary}
  </div>`;

  // ── Skins tables ──
  function skinTable(title,sPlayers,skinsMap,sv){
    if(!sPlayers.length)return'';
    let rows='';
    [...sPlayers].sort((a,b)=>(skinsMap[b.id]||0)-(skinsMap[a.id]||0)).forEach((p,i)=>{
      const s=skinsMap[p.id]||0,w=s*sv;
      const ps=(skinsMap===gSkins?grossScores:nettScores)[p.id]||[];
      const gross=ps.reduce((a,v)=>a+(parseInt(v)||0),0);
      rows+=`<tr style="border-bottom:1px solid var(--cd);${s>0?'background:linear-gradient(90deg,#fffbf0,var(--wh))':''}">
        <td style="padding:7px">${i===0&&s>0?'🏆 ':''}${e(p.name)}</td>
        <td style="text-align:center"><span class="sn2">${s||'—'}</span></td>
        <td style="text-align:center;color:var(--tm)">${gross||'—'}</td>
        <td style="text-align:right;color:${w>0?'var(--gm)':'var(--tl)'};font-weight:${w>0?600:400}">${w>0?`€${w}`:'—'}</td>
      </tr>`;
    });
    return`<div class="card"><div class="ct">${title}</div>
      <table style="width:100%;font-size:.84rem;border-collapse:collapse">
        <thead><tr style="border-bottom:2px solid var(--cd)">
          <th style="text-align:left;padding:5px 7px;color:var(--tm)">Player</th>
          <th style="text-align:center;padding:5px 7px;color:var(--tm)">Skins</th>
          <th style="text-align:center;padding:5px 7px;color:var(--tm)">Gross</th>
          <th style="text-align:right;padding:5px 7px;color:var(--tm)">Winnings</th>
        </tr></thead><tbody>${rows}</tbody>
      </table></div>`;
  }

  // ── Stableford results ──
  let sfTable='';
  if(mp.length){
    const sfSorted=[...mp].sort((a,b)=>(sfTotals[b.id]||0)-(sfTotals[a.id]||0));
    let rows='';
    sfSorted.forEach((p,i)=>{
      const pts=sfTotals[p.id]||0;
      const ps=normalScores[p.id]||[];
      const gross=ps.reduce((a,v)=>a+(parseInt(v)||0),0);
      const isWinner=allChosen&&chosenWinners.some(w=>w.id===p.id);
      rows+=`<tr style="border-bottom:1px solid var(--cd);${isWinner?'background:linear-gradient(90deg,#fffbf0,var(--wh))':i===0&&pts>0&&!allChosen?'background:linear-gradient(90deg,#fffbf0,var(--wh))':''}">
        <td style="padding:7px">${isWinner?'🏆 ':i===0&&pts>0&&!allChosen?'🥇 ':''}${e(p.name)}${isWinner?` <span style="font-size:.7rem;font-weight:600;color:${chosenWinners.find(w=>w.id===p.id)?.isGhost?'var(--tl)':comp.winnersPay>0?'var(--go)':'var(--gm)'}">${chosenWinners.find(w=>w.id===p.id)?.isGhost?'· pays €'+ENTRY_FEE+' (ghost)':comp.winnersPay>0?'· pays €'+comp.winnersPay+' today':'· no entry fee'}</span>`:''}</td>
        <td style="text-align:center;color:var(--tm)">${calcCourseHcp(p.hi)}</td>
        <td style="text-align:center;color:var(--tm)">${gross||'—'}</td>
        <td style="text-align:center"><span class="sn2">${pts||'—'}</span></td>
      </tr>`;
    });
    sfTable=`<div class="card"><div class="ct">🏅 Stableford Results</div>
      <table style="width:100%;font-size:.84rem;border-collapse:collapse">
        <thead><tr style="border-bottom:2px solid var(--cd)">
          <th style="text-align:left;padding:5px 7px;color:var(--tm)">Player</th>
          <th style="text-align:center;padding:5px 7px;color:var(--tm)">Hcp</th>
          <th style="text-align:center;padding:5px 7px;color:var(--tm)">Gross</th>
          <th style="text-align:center;padding:5px 7px;color:var(--tm)">Pts</th>
        </tr></thead><tbody>${rows}</tbody>
      </table></div>`;
  }

  const commitBtn=ui.resultsCommitted
    ?`<span style="color:var(--gm);font-size:.82rem;font-weight:600">✅ Committed to league</span>`
    :ui.resultsConfirm?`<div class="confirm-strip"><span class="tsm" style="color:var(--rd)">Add today's results to the season league?</span><button class="btn bg bsm" data-action="do-commit">Yes, commit</button><button class="btn bo bsm" data-action="cancel-commit">Cancel</button></div>`
    :`<button class="btn bg" data-action="show-commit">Commit to League ›</button>`;

  // ── Team Leaderboard (team games only) ──
  let teamLeaderboard='';
  if(teamGame&&teeGroups.length>0){
    const selGroupId=ui.selectedWinningGroup?parseInt(ui.selectedWinningGroup):null;
    let lbRows='';
    groupOptions.forEach(({g,teamScore,memberPlayers,ghostPlayer},idx)=>{
      const isWinningGroup=selGroupId&&g.id===selGroupId;
      const names=memberPlayers.map(p=>p.name).join(' · ')+(ghostPlayer?` · ${ghostPlayer.name} (👻)` :'');
      lbRows+=`<tr style="border-bottom:1px solid var(--cd);${isWinningGroup?'background:linear-gradient(90deg,#fffbf0,var(--wh));font-weight:600':''}${idx===0&&!selGroupId?'background:linear-gradient(90deg,#fffbf0,var(--wh))':''}">
        <td style="padding:8px 10px;font-family:'Playfair Display',serif;font-size:1rem;color:var(--go)">${idx+1}</td>
        <td style="padding:8px 10px;font-weight:600">${isWinningGroup?'🏆 ':''}Group ${g.id} <span style="font-size:.75rem;color:var(--tl);font-weight:400">${g.time}</span></td>
        <td style="padding:8px 10px;font-size:.82rem;color:var(--tm)">${names}</td>
        <td style="padding:8px 10px;text-align:right"><span style="font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--go);font-weight:700">${teamScore.total||'—'}</span></td>
      </tr>`;
    });
    teamLeaderboard=`<div class="card"><div class="ct">🏅 Team Leaderboard — Best 3 from 4</div>
      <table style="width:100%;font-size:.84rem;border-collapse:collapse">
        <thead><tr style="border-bottom:2px solid var(--cd)">
          <th style="padding:5px 10px;color:var(--tm)">Rank</th>
          <th style="padding:5px 10px;color:var(--tm)">Group</th>
          <th style="padding:5px 10px;color:var(--tm)">Players</th>
          <th style="text-align:right;padding:5px 10px;color:var(--tm)">Team Pts</th>
        </tr></thead>
        <tbody>${lbRows}</tbody>
      </table>
    </div>`;
  }

  return page('Today\'s Results',
    new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}),
    `<div class="flex gap8 aic">${commitBtn}</div>`,
    `${teamLeaderboard}
    ${competitionPanel}
    ${gp.length>0?skinTable('⛳ Gross Skins Results',gp,gSkins,gsv):''}
    ${np.length>0?skinTable('🏌️ Nett Skins Results',np,nSkins,nsv):''}
    ${sfTable}
    ${allActive.length===0?`<div class="card"><div class="es"><div class="ei">📋</div><div>No players selected for today\'s round.</div></div></div>`:''}`
  );
}

// CONSTRAINTS  — FIX 1: group pairing (3 or 4 players)

function renderConstraints(){
  const {players,constraints,ui}=STATE;
  const active=players.filter(p=>p.playGross||p.playNett||p.playNormal);

  // Pair constraint form
  const pairForm=ui.constraintMode==='pair'?`<div class="fr">

    <div class="fg"><label class="fl">Player 2</label>

    <button class="btn bg" data-action="add-constraint" ${(!ui.constraintP1||!ui.constraintP2)?'disabled':''}>Add</button>
  </div>`:
  // Group constraint form (FIX 1)
  `<div>
    <div class="tsm tmu" style="margin-bottom:8px">Select 2–4 players who must play together as a group (e.g. a match play four-ball):</div>
    <div class="player-check-grid">

    ${group.length>0?`<div class="card"><div class="ct" style="color:#5a4080">🏌️ Must Play Together (Groups)</div>${groupCards}</div>`:''}
    ${!constraints.length?`<div class="card"><div class="es"><div class="ei">🔗</div><div>No constraints set.</div><div class="tsm tmu mt8">Add pair or group constraints — they're respected when generating tee times.</div></div></div>`:''}`
  );

// TEE TIMES
// ══════════════════════════════════════════════════════════════════════════════
function renderTeeTimes(){
  const {players,teeGroups,constraints,ui}=STATE;
  const active=players.filter(p=>p.playGross||p.playNett||p.playNormal);
  const togetherC=constraints.filter(c=>c.type==='together');
  const groupC=constraints.filter(c=>c.type==='group');
  const apartC=constraints.filter(c=>c.type==='apart');
  const getP=id=>players.find(p=>p.id===id);
  const sizes=buildGroupSizes(active.length,ui.tee3First);
  const waText=()=>{
    const now=new Date();const ds=now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'short',year:'numeric'});
    const lines=[`⛳ ${ds}`];
    if(ui.teeCompetition.trim())lines.push(`Competition: ${ui.teeCompetition.trim()}`);
    if(ui.teeCourseRules.trim())lines.push(`Course Rules: ${ui.teeCourseRules.trim()}`);
    if(ui.teeTodayRules.trim())lines.push(`Today's Rules: ${ui.teeTodayRules.trim()}`);
    lines.push('','Tee Times');
    teeGroups.forEach((g,idx)=>{
      lines.push('',`Group ${g.id} – ${g.time}`);
      g.members.forEach(id=>{
        const p=getP(id);if(!p)return;
        const hcp=calcCourseHcp(p.hi);
        // FIX 3: use 🏅 for Normal
        const comp=[p.playGross&&'⛳ Gross',p.playNett&&'🏌️ Nett',p.playNormal&&'🏅 Normal'].filter(Boolean).join(' + ');
        lines.push(`  · ${p.name} (${hcp}) – ${comp}`);
      });
      if(idx<teeGroups.length-1)lines.push('____________');
    });
    return lines.join('\n');
  };
  let groupsHtml='';
  if(teeGroups.length){
    teeGroups.forEach(g=>{
      const viol=apartC.filter(c=>g.members.includes(c.p1)&&g.members.includes(c.p2)).map(c=>`⚠️ ${players.find(p=>p.id===c.p1)?.name} &amp; ${players.find(p=>p.id===c.p2)?.name} prefer not to play together`);
      const members=g.members.map(id=>{const p=getP(id);if(!p)return'';
        return`<div class="mp"><span>${e(p.name)}</span><span class="tmu" style="font-size:.66rem">Hcp ${calcCourseHcp(p.hi)}</span>${p.playGross?'<span class="tg tgg">⛳</span>':''}${p.playNett?'<span class="tg tgn">🏌️</span>':''}${p.playNormal?'<span class="tg tgm">🏅</span>':''}</div>`;
      }).join('');
      groupsHtml+=`<div class="gc" style="${viol.length?'border-left-color:var(--rd)':''}">
        <div class="gh"><div class="gn">${g.id}</div><div><div class="gt">${g.time}</div><div class="tsm tmu">Group ${g.id} · ${g.members.length}-ball</div></div></div>
        <div class="gm2">${members}</div>
        ${viol.map(v=>`<div style="color:var(--rd);font-size:.74rem;margin-top:6px">${v}</div>`).join('')}
      </div>`;
    });
    groupsHtml+=`<div class="card" style="border-left:4px solid #25D366;margin-top:8px">
      <div class="ct" style="color:var(--gd)">💬 Share to WhatsApp</div>
      <div class="fr" style="flex-direction:column;gap:10px">
        <div class="fg" style="width:100%"><label class="fl">Competition</label><select class="fi" style="width:100%" data-action="tee-competition">${competitions().map(c=>`<option value="${c.id}" ${ui.competitionType===c.id?'selected':''}>${e(c.label)}</option>`).join('')}</select></div>
        <div class="fg" style="width:100%"><label class="fl">Course Rules</label><input class="fi" style="width:100%" id="wa-rules" value="${e(ui.teeCourseRules)}" data-action="wa-rules"></div>
        <div class="fg" style="width:100%"><label class="fl">Today's Rules (optional)</label><input class="fi" style="width:100%" id="wa-today" value="${e(ui.teeTodayRules)}" data-action="wa-today"></div>
      </div>
      <div class="wa-preview" id="wa-preview">${e(waText())}</div>
      <button class="btn" style="background:#25D366;color:#fff;font-weight:700;font-size:.9rem;padding:10px 24px;border-radius:10px" data-action="copy-wa">${ui.teeCopied?'✅ Copied!':'📋 Copy for WhatsApp'}</button>
      ${ui.teeCopied?'<span class="tsm tmu" style="margin-left:12px">Paste directly into WhatsApp</span>':''}
    </div>`;
  } else {
    groupsHtml=`<div class="card"><div class="es"><div class="ei">⏱️</div><div>No tee times assigned yet.</div><div class="tsm tmu mt8">Select players, set any constraints, then hit Auto-Assign.</div></div></div>`;
  }
  return page('Tee Times',`Next game: ${nextGameDate()} · ${active.length} players active`,
    '',
    `<div class="card"><div class="ct">Generate Tee Times</div>
      <div class="fr">
        <div class="fg"><label class="fl">First Tee Time</label>
          <select class="fi" style="width:110px" data-action="tee-start">${TEE_TIME_OPTIONS.map(t=>`<option value="${t}" ${ui.teeStart===t?'selected':''}>${t}</option>`).join('')}</select>
        </div>
        <div class="fg"><label class="fl">3-ball position</label>
          <div class="flex gap8">
            <button class="btn bsm ${ui.tee3First?'bp':'bo'}" data-action="tee-3first" data-val="true">3s → 4s</button>
            <button class="btn bsm ${!ui.tee3First?'bp':'bo'}" data-action="tee-3first" data-val="false">4s → 3s</button>
          </div>
        </div>
        <div class="fg" style="justify-content:flex-end"><span class="tsm tmu" style="padding-bottom:8px">8-min intervals · ${active.length} players → ${sizes.map(s=>`${s}-ball`).join(' + ')||'none'}</span></div>
        <button class="btn bg" data-action="auto-assign" ${!active.length?'disabled':''}>🎲 Auto-Assign</button>
        <button class="btn bd" data-action="clear-tee" ${!teeGroups.length?'disabled':''}>Clear</button>
      </div>
      ${!active.length?`<div class="tsm" style="color:var(--rd)">No players selected — go to Players tab first.</div>`:''}
    </div>${groupsHtml}`
  );
}
